<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- Sentry browser SDK: forwards JS errors + unhandled rejections to our Sentry project. -->
  <script
    src="https://js.sentry-cdn.com/2d45e7a7cdc726451c61d775aa22fbf2.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="/assets/js/sentry-init.js"></script>
  <title>home · cash bff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    :root {
      --cash-green: #014751;
      --electric-green: #D3FFB4;
      --periwinkle: #C5B6F1;
      --off-black: #1A1717;
      --vanilla: #FCFAF2;
      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    /* ── Viewport (the fixed window onto the world) ─── */
    .viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--vanilla);
      touch-action: none;   /* we handle pan + zoom ourselves */
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    .viewport.is-panning { cursor: grabbing; }

    /* ── World (the pannable, zoomable canvas) ────── */
    .world {
      position: absolute;
      /* Very large so "edges" aren't reachable in normal use. Centered by JS. */
      width: 8000px;
      height: 8000px;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      /* The dot grid. 32px spacing, off-black at 8% opacity. Scales with zoom. */
      background-color: var(--vanilla);
      background-image: radial-gradient(circle, rgba(26,23,23,0.18) 1px, transparent 1.4px);
      background-size: 32px 32px;
      background-position: 0 0;
      will-change: transform;
    }

    /* ── Pinned viewport UI (does NOT pan/zoom) ──── */
    .chip {
      position: fixed;
      z-index: 20;
      padding: 0.55rem 0.9rem;
      border-radius: 100px;
      font-size: 0.82rem;
      background: rgba(252,250,242,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(26,23,23,0.06);
      box-shadow: 0 2px 10px -6px rgba(26,23,23,0.25);
    }
    .chip--wordmark {
      top: 1rem; left: 1rem;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
      padding: 0.4rem 0.8rem;
    }
    .chip--top-right {
      top: 1rem; right: 1rem;
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.4rem 0.8rem;
    }
    .pill-phone {
      color: var(--cash-green);
      font-weight: 500;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
    }
    .signout {
      opacity: 0.55;
      font-weight: 500;
      font-size: 0.78rem;
      transition: opacity 0.15s ease, color 0.15s ease;
    }
    .signout:hover { opacity: 1; color: var(--cash-green); }

    /* ── Bottom-center dock of action chips ──────── */
    /* The dock pins to the bottom of the viewport and holds the three
       sibling chips (add-account · goal · zoom). When the add-account
       button is in its empty-state "center" variant, we remove it from
       the dock but keep goal + zoom anchored down here, just smaller. */
    .dock {
      position: fixed;
      left: 50%;
      bottom: 1.4rem;
      transform: translateX(-50%);
      z-index: 25;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      pointer-events: none; /* children re-enable */
    }
    .dock > * { pointer-events: auto; }
    .dock.is-empty-state { bottom: 1.1rem; }
    .dock.is-empty-state .dock-chip { transform: scale(0.92); }
    .dock.is-empty-state .dock-chip:hover { transform: scale(0.92) translateY(-2px); }

    /* Shared chip aesthetic for every dock button. */
    .dock-chip {
      font-family: var(--font-body);
      font-weight: 600;
      letter-spacing: 0.01em;
      font-size: 0.88rem;
      padding: 0.7rem 1.3rem;
      border-radius: 100px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0.92;
      box-shadow: 0 6px 18px -10px rgba(1,71,81,0.3);
      transition: background 0.2s ease, transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--off-black);
      line-height: 1;
    }
    .dock-chip:hover {
      opacity: 1;
      transform: translateY(-2px);
      box-shadow: 0 10px 22px -10px rgba(1,71,81,0.35);
    }
    .dock-chip:active { transform: translateY(0) scale(0.97); }
    .dock-chip:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 3px;
    }

    /* Add-account chip (electric-green) — the pivot color on this page. */
    .add-btn {
      position: fixed;
      z-index: 25;
      font-family: var(--font-body);
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: background 0.2s ease, transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }
    .add-btn--center {
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 1.1rem 2rem;
      font-size: 1.05rem;
      background: var(--electric-green);
      color: var(--off-black);
      border-radius: 100px;
      box-shadow: 0 14px 36px -14px rgba(1,71,81,0.35);
    }
    .add-btn--center:hover {
      transform: translate(-50%, -50%) scale(1.03);
      box-shadow: 0 20px 44px -14px rgba(1,71,81,0.45);
    }
    /* Dock variant: sits in the flex dock alongside the other chips. */
    .add-btn--dock {
      position: static;
      transform: none;
      background: rgba(211,255,180,0.82);
      color: var(--off-black);
    }
    .add-btn--dock:hover {
      transform: translateY(-2px);
    }
    .add-btn:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 3px;
    }

    /* Goal chip (periwinkle) — ties to the goal tile on the canvas. */
    .goal-chip {
      background: rgba(197,182,241,0.85);
    }
    .goal-chip:hover { background: rgba(197,182,241,0.98); }
    .goal-chip[data-state="filled"] {
      /* Slightly deeper periwinkle once set, to read as "edit this". */
      background: rgba(197,182,241,0.92);
    }

    /* Zoom chip (neutral vanilla with cash-green accent). */
    .zoom-chip {
      background: rgba(252,250,242,0.9);
      border: 1px solid rgba(1,71,81,0.18);
      color: var(--cash-green);
    }
    .zoom-chip:hover { background: var(--vanilla); }
    .zoom-chip[aria-expanded="true"] {
      background: var(--cash-green);
      color: var(--vanilla);
      border-color: var(--cash-green);
    }
    .zoom-chip__icon {
      /* Inline magnifier glyph — flat, not an emoji, so it matches the
         wordmark weight of the rest of the UI. */
      width: 0.95rem;
      height: 0.95rem;
      display: inline-block;
      flex: 0 0 auto;
    }
    /* Positioning context so .zoom-popover can anchor to the chip. */
    .zoom-chip-wrap { position: relative; }

    /* Zoom popover: slim slider panel above the zoom chip. */
    .zoom-popover {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 0.55rem);
      transform: translateX(-50%) translateY(6px);
      min-width: 240px;
      padding: 0.75rem 0.9rem 0.65rem;
      background: rgba(252,250,242,0.96);
      border: 1px solid rgba(26,23,23,0.08);
      border-radius: 14px;
      box-shadow: 0 18px 40px -18px rgba(1,71,81,0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 26;
    }
    .zoom-popover.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }
    .zoom-popover__row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.72rem;
      font-weight: 500;
      color: rgba(26,23,23,0.6);
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }
    .zoom-popover__end {
      min-width: 2.2rem;
      text-align: center;
      user-select: none;
    }
    .zoom-popover__meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.4rem;
      font-size: 0.72rem;
      color: rgba(26,23,23,0.55);
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }
    .zoom-popover__percent {
      font-family: var(--font-body);
      font-weight: 600;
      color: var(--cash-green);
      font-size: 0.78rem;
    }
    .zoom-popover__reset {
      font-family: inherit;
      background: none;
      border: none;
      padding: 0.15rem 0.3rem;
      font-size: 0.72rem;
      color: var(--cash-green);
      opacity: 0.75;
      cursor: pointer;
      text-transform: lowercase;
      letter-spacing: 0.02em;
      border-radius: 6px;
      transition: opacity 0.15s ease, background 0.15s ease;
    }
    .zoom-popover__reset:hover { opacity: 1; background: rgba(1,71,81,0.08); }
    .zoom-popover__reset:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 2px;
    }

    /* Slim range slider, brand-styled. WebKit + Firefox rules differ, so
       we repeat the rules rather than hoping ::-webkit and ::-moz merge. */
    .zoom-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      background: rgba(1,71,81,0.15);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
      margin: 0;
    }
    .zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--cash-green);
      border: 2px solid var(--vanilla);
      box-shadow: 0 2px 6px -2px rgba(1,71,81,0.5);
      cursor: grab;
      transition: transform 0.1s ease;
    }
    .zoom-slider::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.1); }
    .zoom-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--cash-green);
      border: 2px solid var(--vanilla);
      box-shadow: 0 2px 6px -2px rgba(1,71,81,0.5);
      cursor: grab;
    }
    .zoom-slider::-moz-range-thumb:active { cursor: grabbing; }
    .zoom-slider:focus-visible {
      box-shadow: 0 0 0 3px rgba(1,71,81,0.18);
    }

    /* ── Cards floating on the canvas ───────────────── */
    .seed {
      position: absolute;
      border-radius: 1.1rem;
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: var(--vanilla);
      background: var(--cash-green);
      cursor: pointer;
      border: none;
      font-family: inherit;
      text-align: left;
      overflow: hidden;
      box-shadow: 0 14px 36px -18px rgba(26,23,23,0.35);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      will-change: transform;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      --rot: 0deg;
      transform: rotate(var(--rot));
      animation: drift var(--drift-dur, 12s) ease-in-out infinite;
      animation-delay: var(--drift-delay, 0s);
    }
    .seed:hover {
      box-shadow: 0 24px 52px -18px rgba(26,23,23,0.45);
      transform: rotate(var(--rot)) translateY(-3px);
      z-index: 10;
    }
    .seed::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 15%, rgba(211,255,180,0.12), transparent 55%);
      pointer-events: none;
    }
    /* Soft settle-in when a card is newly added. */
    .seed.is-new {
      animation: settle 0.55s cubic-bezier(0.2, 0.8, 0.2, 1) 1,
                 drift var(--drift-dur, 12s) ease-in-out 0.55s infinite;
    }
    @keyframes settle {
      0%   { transform: rotate(var(--rot)) scale(0.6); opacity: 0; }
      60%  { transform: rotate(var(--rot)) scale(1.04); opacity: 1; }
      100% { transform: rotate(var(--rot)) scale(1); opacity: 1; }
    }

    /* Lower-amplitude drift than v2 — the canvas is the motion focus now. */
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) rotate(var(--rot)); }
      33%      { transform: translate(3px, -2px) rotate(calc(var(--rot) + 0.3deg)); }
      66%      { transform: translate(-2px, 2px) rotate(calc(var(--rot) - 0.2deg)); }
    }

    .seed.size-huge {
      background: var(--electric-green);
      color: var(--off-black);
    }
    .seed.size-huge .seed__balance { color: var(--cash-green); }
    .seed.size-huge .seed__top,
    .seed.size-huge .seed__bottom { color: var(--off-black); opacity: 0.7; }

    .seed.size-large {
      background: var(--periwinkle);
      color: var(--off-black);
    }
    .seed.size-large .seed__balance { color: var(--cash-green); }
    .seed.size-large .seed__top,
    .seed.size-large .seed__bottom { color: var(--off-black); opacity: 0.7; }

    .seed.size-med   { background: var(--cash-green); }
    .seed.size-small { background: #022d33; }
    .seed.size-tiny  { background: #01272d; opacity: 0.88; }

    .seed__top {
      font-weight: 500; font-size: 0.78rem;
      letter-spacing: 0.02em; opacity: 0.75;
      text-transform: lowercase;
    }
    .seed__balance {
      font-family: var(--font-display);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--electric-green);
    }
    .seed.size-huge  .seed__balance { font-size: 3rem; }
    .seed.size-large .seed__balance { font-size: 2.2rem; }
    .seed.size-med   .seed__balance { font-size: 1.65rem; }
    .seed.size-small .seed__balance { font-size: 1.3rem; }
    .seed.size-tiny  .seed__balance { font-size: 1.05rem; }
    .seed__balance .cents {
      font-size: 0.45em; opacity: 0.65; font-weight: 500;
      margin-left: 0.08em;
    }
    .seed__bottom {
      font-weight: 500; font-size: 0.78rem;
      opacity: 0.75; text-transform: lowercase;
    }

    /* ── Loading / error floating toast ───────────── */
    .toast {
      position: fixed;
      top: 38%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      color: var(--off-black);
      opacity: 0.55;
      font-size: 0.92rem;
      font-style: italic;
      pointer-events: none;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 0.7;  }
    }
    .toast--loading { animation: shimmer 1.8s ease-in-out infinite; }

    /* ── Modal (add-account flow) ────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(26,23,23,0.28);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: var(--vanilla);
      border-radius: 1.4rem;
      padding: 1.8rem 1.6rem 1.4rem;
      width: 100%;
      max-width: 26rem;
      box-shadow: 0 30px 80px -30px rgba(26,23,23,0.5);
      transform: translateY(12px) scale(0.98);
      transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
      max-height: calc(100dvh - 2.5rem);
      overflow-y: auto;
    }
    .modal-backdrop.is-open .modal { transform: translateY(0) scale(1); }
    .modal__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
      margin-bottom: 1.3rem;
      line-height: 1;
    }
    .modal__choices {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .modal__btn {
      width: 100%;
      padding: 0.95rem 1.2rem;
      border-radius: 14px;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0.005em;
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      text-align: center;
    }
    .modal__btn--primary {
      background: var(--cash-green);
      color: var(--vanilla);
    }
    .modal__btn--primary:hover { transform: translateY(-1px); background: #023239; }
    .modal__btn--secondary {
      background: transparent;
      color: var(--cash-green);
      border: 1.5px solid var(--cash-green);
    }
    .modal__btn--secondary:hover { background: rgba(1,71,81,0.06); }
    .modal__btn--tertiary {
      background: transparent;
      color: var(--off-black);
      opacity: 0.55;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
    }
    .modal__btn--tertiary:hover { opacity: 1; }
    .modal__btn:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 2px;
    }

    /* ── Manual form (inside modal) ────────────── */
    .manual-form { display: none; flex-direction: column; gap: 0.9rem; }
    .manual-form.is-visible { display: flex; }
    .modal__choices.is-hidden { display: none; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .field__label {
      font-size: 0.78rem;
      font-weight: 500;
      opacity: 0.7;
      text-transform: lowercase;
      letter-spacing: 0.01em;
    }
    .field__input {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border-radius: 12px;
      border: 1.5px solid rgba(26,23,23,0.12);
      background: rgba(252,250,242,0.6);
      font-family: inherit;
      font-size: 0.98rem;
      color: var(--off-black);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .field__input:focus {
      outline: none;
      border-color: var(--cash-green);
      background: #fff;
    }
    .field__input::placeholder { color: rgba(26,23,23,0.35); }

    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.15rem;
    }
    .quick-chip {
      padding: 0.3rem 0.7rem;
      border-radius: 100px;
      background: rgba(1,71,81,0.06);
      color: var(--cash-green);
      font-size: 0.78rem;
      font-weight: 500;
      transition: background 0.15s ease;
    }
    .quick-chip:hover, .quick-chip.is-active { background: rgba(1,71,81,0.15); }

    .form__actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }
    .form__actions .modal__btn { flex: 1; }

    .form__error {
      font-size: 0.78rem;
      color: #8a2a2a;
      min-height: 1.1em;
    }

    /* ── Goal tile (lives on the canvas beside .seed tiles) ─ */
    .goal-tile {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      border-radius: 1.1rem;
      padding: 1rem 1.1rem;
      background: var(--periwinkle);
      color: var(--off-black);
      border: 1.5px dashed rgba(26,23,23,0.38);
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      overflow: hidden;
      box-shadow: 0 12px 30px -18px rgba(26,23,23,0.3);
      transition: box-shadow 0.3s ease, transform 0.3s ease, background 0.3s ease;
      will-change: transform;
      --rot: 0deg;
      transform: rotate(var(--rot));
      /* Gentler drift than cards — the goal is steadier than the debts. */
      animation: goal-drift 14s ease-in-out infinite,
                 goal-dash 5s linear infinite;
    }
    .goal-tile:hover {
      box-shadow: 0 22px 48px -18px rgba(26,23,23,0.4);
      transform: rotate(var(--rot)) translateY(-3px);
      background: #d5c7f7;
      z-index: 9;
    }
    .goal-tile:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 3px;
    }
    .goal-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 15%, rgba(252,250,242,0.35), transparent 55%);
      pointer-events: none;
    }
    .goal-tile__plus {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2.4rem;
      line-height: 1;
      color: rgba(26,23,23,0.75);
      user-select: none;
    }
    .goal-tile__label {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.92rem;
      letter-spacing: 0.01em;
      text-transform: lowercase;
      color: rgba(26,23,23,0.7);
    }
    .goal-tile__kicker {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      text-transform: lowercase;
      color: rgba(26,23,23,0.55);
      margin-bottom: 0.1rem;
    }
    .goal-tile__intention {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.96rem;
      line-height: 1.3;
      color: var(--off-black);
      /* Clamp to the tile; long strings trim with a soft ellipsis. */
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 0.25rem;
    }
    .goal-tile.is-filled {
      border-style: solid;
      border-color: rgba(1,71,81,0.25);
      animation: goal-drift 14s ease-in-out infinite;
    }
    .goal-tile.is-new {
      animation: goal-settle 0.55s cubic-bezier(0.2, 0.8, 0.2, 1) 1,
                 goal-drift 14s ease-in-out 0.55s infinite;
    }
    @keyframes goal-drift {
      0%, 100% { transform: translate(0, 0) rotate(var(--rot)); }
      50%      { transform: translate(2px, -1px) rotate(calc(var(--rot) + 0.2deg)); }
    }
    @keyframes goal-dash {
      0%   { background-position: 0 0, 0 0; }
      100% { background-position: 0 0, 0 0; }
    }
    @keyframes goal-settle {
      0%   { transform: rotate(var(--rot)) scale(0.7); opacity: 0; }
      60%  { transform: rotate(var(--rot)) scale(1.03); opacity: 1; }
      100% { transform: rotate(var(--rot)) scale(1); opacity: 1; }
    }
    /* Subtle dash-offset idle pulse on the empty tile border. */
    .goal-tile:not(.is-filled) {
      background-image:
        linear-gradient(var(--periwinkle), var(--periwinkle));
    }

    /* ── Periwinkle modal variant (add-goal) ──────── */
    .modal--periwinkle {
      background: #efe7ff;
      border: 1.5px solid rgba(1,71,81,0.12);
    }
    .modal__title--periwinkle {
      color: var(--cash-green);
      margin-bottom: 0.4rem;
    }
    .modal__subtitle {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.92rem;
      color: rgba(26,23,23,0.65);
      margin-bottom: 1.1rem;
      text-transform: lowercase;
      letter-spacing: 0.01em;
    }
    .goal-form { display: flex; flex-direction: column; gap: 0.75rem; }
    .goal-form__textarea {
      resize: none;
      min-height: 88px;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.4;
      background: rgba(252,250,242,0.85);
    }
    .goal-form__count {
      font-size: 0.72rem;
      color: rgba(26,23,23,0.45);
      text-align: right;
      margin-top: 0.15rem;
    }
    .goal-form__soft {
      font-size: 0.76rem;
      color: rgba(26,23,23,0.5);
      text-align: center;
      margin-top: 0.5rem;
      font-style: italic;
    }
    .modal__btn--submit {
      background: var(--electric-green);
      color: var(--off-black);
      box-shadow: 0 8px 22px -12px rgba(1,71,81,0.4);
    }
    .modal__btn--submit:hover {
      transform: translateY(-1px);
      background: #c6f6a3;
    }
    .modal__btn--submit:disabled {
      opacity: 0.6;
      cursor: default;
      transform: none;
    }

    /* Accessibility helper: hide text visually but keep it for screen readers. */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Reduced motion ─────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .seed, .seed.is-new { animation: none !important; transform: rotate(var(--rot)) !important; }
      .goal-tile, .goal-tile.is-new, .goal-tile.is-filled {
        animation: none !important;
        transform: rotate(var(--rot)) !important;
      }
      .toast--loading { animation: none; }
      .modal, .modal-backdrop { transition: none !important; }
    }

    /* ── Mobile polish ──────────────────────────── */
    @media (max-width: 560px) {
      .chip--top-right { gap: 0.5rem; }
      .pill-phone { font-size: 0.72rem; }
      .add-btn--center { padding: 0.95rem 1.5rem; font-size: 0.98rem; }
      .modal__title { font-size: 1.7rem; }
      /* Shrink the dock chips so three fit on a narrow screen. */
      .dock { gap: 0.35rem; bottom: 1rem; }
      .dock-chip { font-size: 0.78rem; padding: 0.55rem 0.9rem; }
      .zoom-popover { min-width: 210px; padding: 0.65rem 0.75rem 0.55rem; }
    }
    @media (max-width: 380px) {
      /* Extra tight: hide the add-account label text in favor of just "+".
         Goal + zoom still read at a glance. */
      .dock-chip { padding: 0.5rem 0.75rem; }
    }
  </style>
</head>
<body>
  <!-- Fixed viewport UI (does not pan/zoom) -->
  <a href="index.html" class="chip chip--wordmark" aria-label="cash bff home">cash bff</a>
  <div class="chip chip--top-right">
    <span class="pill-phone" id="phone-pill">+0 signed in</span>
    <button type="button" class="signout" id="signout">sign out</button>
  </div>

  <!-- Pan/zoom canvas -->
  <div class="viewport" id="viewport" role="application" aria-label="your cards workspace" tabindex="0">
    <div class="world" id="world"></div>
  </div>

  <!-- Floating loading toast (removed once cards render) -->
  <div class="toast toast--loading" id="loading-toast" aria-live="polite">settling in…</div>

  <!-- Central add button (empty-state only). When cards exist, the button
       moves into the dock below and this element is styled/absent. -->
  <button
    type="button"
    class="add-btn add-btn--center"
    id="add-account-btn"
    tabindex="0"
    aria-haspopup="dialog"
    aria-controls="add-modal"
  >+ add account</button>

  <!-- Bottom-center dock: action chips that live on the viewport (never pan/zoom).
       Order (left → right): add-account · goal · zoom. When a goal is set the goal
       chip label flips to an edit affordance; clicking either chip opens the same
       modal. Zoom chip toggles an inline slider popover above itself. -->
  <div class="dock" id="dock">
    <!-- Goal chip — sibling of the add-account chip. -->
    <button
      type="button"
      class="dock-chip goal-chip"
      id="goal-chip"
      data-state="empty"
      aria-haspopup="dialog"
      aria-controls="goal-modal"
      aria-label="add a goal"
    >+ goal</button>

    <!-- Zoom chip + popover. The popover is a child so it positions relative
         to the chip (see .zoom-popover absolute rules). -->
    <div class="zoom-chip-wrap">
      <button
        type="button"
        class="dock-chip zoom-chip"
        id="zoom-chip"
        aria-haspopup="true"
        aria-expanded="false"
        aria-controls="zoom-popover"
        aria-label="zoom controls"
      ><svg class="zoom-chip__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>zoom</button>

      <div class="zoom-popover" id="zoom-popover" role="group" aria-label="zoom slider" hidden>
        <div class="zoom-popover__row">
          <span class="zoom-popover__end" aria-hidden="true">0.35x</span>
          <label for="zoom-slider" class="sr-only">zoom level</label>
          <input
            type="range"
            class="zoom-slider"
            id="zoom-slider"
            min="0.35"
            max="2"
            step="0.01"
            value="0.75"
          >
          <span class="zoom-popover__end" aria-hidden="true">2x</span>
        </div>
        <div class="zoom-popover__meta">
          <span class="zoom-popover__percent" id="zoom-percent">75%</span>
          <button type="button" class="zoom-popover__reset" id="zoom-reset">reset</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add-goal modal -->
  <div class="modal-backdrop" id="goal-modal" role="dialog" aria-modal="true" aria-labelledby="goal-modal-title" hidden>
    <div class="modal modal--periwinkle" id="goal-modal-panel">
      <h2 class="modal__title modal__title--periwinkle" id="goal-modal-title">add goal here.</h2>
      <p class="modal__subtitle" id="goal-modal-subtitle">what&rsquo;s your first intention?</p>

      <form class="goal-form" id="goal-form" novalidate>
        <div class="field">
          <label class="field__label sr-only" for="goal-text">intention</label>
          <textarea
            class="field__input goal-form__textarea"
            id="goal-text"
            name="text"
            maxlength="120"
            placeholder="e.g. be out of credit card debt by july"
            rows="3"
            autocomplete="off"
            required
          ></textarea>
          <div class="goal-form__count"><span id="goal-count">0</span>/120</div>
        </div>

        <div class="form__error" id="goal-error" aria-live="polite"></div>

        <div class="form__actions">
          <button type="button" class="modal__btn modal__btn--tertiary" id="goal-close">close</button>
          <button type="submit" class="modal__btn modal__btn--submit" id="goal-submit">set intention &rarr;</button>
        </div>

        <p class="goal-form__soft">no judgment. you can change this anytime.</p>
      </form>
    </div>
  </div>

  <!-- Add-account modal -->
  <div class="modal-backdrop" id="add-modal" role="dialog" aria-modal="true" aria-labelledby="add-modal-title" hidden>
    <div class="modal" id="add-modal-panel">
      <h2 class="modal__title" id="add-modal-title">add an account.</h2>

      <!-- Three-choice view -->
      <div class="modal__choices" id="modal-choices">
        <button type="button" class="modal__btn modal__btn--primary" id="choice-manual">manual</button>
        <button type="button" class="modal__btn modal__btn--secondary" id="choice-plaid">plaid</button>
        <button type="button" class="modal__btn modal__btn--tertiary" id="choice-close">close</button>
      </div>

      <!-- Manual form (hidden by default) -->
      <form class="manual-form" id="manual-form" novalidate>
        <div class="field">
          <label class="field__label" for="f-institution">institution</label>
          <input class="field__input" type="text" id="f-institution" name="institution" placeholder="chase, capital one, …" autocomplete="off" required>
          <div class="chips-row" id="institution-chips">
            <button type="button" class="quick-chip" data-v="Chase">chase</button>
            <button type="button" class="quick-chip" data-v="Capital One">capital one</button>
            <button type="button" class="quick-chip" data-v="Discover">discover</button>
            <button type="button" class="quick-chip" data-v="Credit One">credit one</button>
            <button type="button" class="quick-chip" data-v="Bank of America">bank of america</button>
            <button type="button" class="quick-chip" data-v="other">other</button>
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="f-mask">last 4</label>
          <input class="field__input" type="text" id="f-mask" name="mask" inputmode="numeric" pattern="\d{4}" maxlength="4" placeholder="1234" autocomplete="off" required>
        </div>

        <div class="field">
          <label class="field__label" for="f-balance">current balance</label>
          <input class="field__input" type="text" id="f-balance" name="balance" inputmode="decimal" placeholder="$0.00" autocomplete="off" required>
        </div>

        <div class="field">
          <label class="field__label" for="f-limit">credit limit</label>
          <input class="field__input" type="text" id="f-limit" name="limit" inputmode="decimal" placeholder="$0" autocomplete="off">
        </div>

        <div class="form__error" id="form-error" aria-live="polite"></div>

        <div class="form__actions">
          <button type="button" class="modal__btn modal__btn--tertiary" id="manual-back">back</button>
          <button type="submit" class="modal__btn modal__btn--primary" id="manual-submit">add it.</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/js/home.js" defer></script>
  <script src="/assets/js/add-account.js" defer></script>
  <script src="/assets/js/add-goal.js" defer></script>
</body>
</html>
