<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- Sentry browser SDK: forwards JS errors + unhandled rejections to our Sentry project. -->
  <script
    src="https://js.sentry-cdn.com/2d45e7a7cdc726451c61d775aa22fbf2.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="/assets/js/sentry-init.js"></script>
  <title>home · cash bff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    :root {
      --cash-green: #014751;
      --electric-green: #D3FFB4;
      --periwinkle: #C5B6F1;
      --off-black: #1A1717;
      --vanilla: #FCFAF2;
      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    /* ── Viewport (the fixed window onto the world) ─── */
    .viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--vanilla);
      touch-action: none;   /* we handle pan + zoom ourselves */
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    .viewport.is-panning { cursor: grabbing; }

    /* ── World (the pannable, zoomable canvas) ────── */
    .world {
      position: absolute;
      /* Very large so "edges" aren't reachable in normal use. Centered by JS. */
      width: 8000px;
      height: 8000px;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      /* The dot grid. 32px spacing, off-black at 8% opacity. Scales with zoom. */
      background-color: var(--vanilla);
      background-image: radial-gradient(circle, rgba(26,23,23,0.18) 1px, transparent 1.4px);
      background-size: 32px 32px;
      background-position: 0 0;
      will-change: transform;
    }

    /* ── Pinned viewport UI (does NOT pan/zoom) ──── */
    .chip {
      position: fixed;
      z-index: 20;
      padding: 0.55rem 0.9rem;
      border-radius: 100px;
      font-size: 0.82rem;
      background: rgba(252,250,242,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(26,23,23,0.06);
      box-shadow: 0 2px 10px -6px rgba(26,23,23,0.25);
    }
    .chip--wordmark {
      top: 1rem; left: 1rem;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
      padding: 0.4rem 0.8rem;
    }
    .chip--top-right {
      top: 1rem; right: 1rem;
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.4rem 0.8rem;
    }
    .pill-phone {
      color: var(--cash-green);
      font-weight: 500;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
    }
    .signout {
      opacity: 0.55;
      font-weight: 500;
      font-size: 0.78rem;
      transition: opacity 0.15s ease, color 0.15s ease;
    }
    .signout:hover { opacity: 1; color: var(--cash-green); }

    /* ── Add button: centered when empty, bottom-center chip when populated ── */
    .add-btn {
      position: fixed;
      z-index: 25;
      font-family: var(--font-body);
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: background 0.2s ease, transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }
    .add-btn--center {
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 1.1rem 2rem;
      font-size: 1.05rem;
      background: var(--electric-green);
      color: var(--off-black);
      border-radius: 100px;
      box-shadow: 0 14px 36px -14px rgba(1,71,81,0.35);
    }
    .add-btn--center:hover {
      transform: translate(-50%, -50%) scale(1.03);
      box-shadow: 0 20px 44px -14px rgba(1,71,81,0.45);
    }
    .add-btn--corner {
      bottom: 1.4rem; left: 50%;
      transform: translateX(-50%);
      padding: 0.7rem 1.3rem;
      font-size: 0.88rem;
      background: rgba(211,255,180,0.78);
      color: var(--off-black);
      border-radius: 100px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0.9;
      box-shadow: 0 6px 18px -10px rgba(1,71,81,0.3);
    }
    .add-btn--corner:hover {
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }
    .add-btn:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 3px;
    }

    /* ── Cards floating on the canvas ───────────────── */
    .seed {
      position: absolute;
      border-radius: 1.1rem;
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: var(--vanilla);
      background: var(--cash-green);
      cursor: pointer;
      border: none;
      font-family: inherit;
      text-align: left;
      overflow: hidden;
      box-shadow: 0 14px 36px -18px rgba(26,23,23,0.35);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      will-change: transform;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      --rot: 0deg;
      transform: rotate(var(--rot));
      animation: drift var(--drift-dur, 12s) ease-in-out infinite;
      animation-delay: var(--drift-delay, 0s);
    }
    .seed:hover {
      box-shadow: 0 24px 52px -18px rgba(26,23,23,0.45);
      transform: rotate(var(--rot)) translateY(-3px);
      z-index: 10;
    }
    .seed::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 15%, rgba(211,255,180,0.12), transparent 55%);
      pointer-events: none;
    }
    /* Soft settle-in when a card is newly added. */
    .seed.is-new {
      animation: settle 0.55s cubic-bezier(0.2, 0.8, 0.2, 1) 1,
                 drift var(--drift-dur, 12s) ease-in-out 0.55s infinite;
    }
    @keyframes settle {
      0%   { transform: rotate(var(--rot)) scale(0.6); opacity: 0; }
      60%  { transform: rotate(var(--rot)) scale(1.04); opacity: 1; }
      100% { transform: rotate(var(--rot)) scale(1); opacity: 1; }
    }

    /* Lower-amplitude drift than v2 — the canvas is the motion focus now. */
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) rotate(var(--rot)); }
      33%      { transform: translate(3px, -2px) rotate(calc(var(--rot) + 0.3deg)); }
      66%      { transform: translate(-2px, 2px) rotate(calc(var(--rot) - 0.2deg)); }
    }

    .seed.size-huge {
      background: var(--electric-green);
      color: var(--off-black);
    }
    .seed.size-huge .seed__balance { color: var(--cash-green); }
    .seed.size-huge .seed__top,
    .seed.size-huge .seed__bottom { color: var(--off-black); opacity: 0.7; }

    .seed.size-large {
      background: var(--periwinkle);
      color: var(--off-black);
    }
    .seed.size-large .seed__balance { color: var(--cash-green); }
    .seed.size-large .seed__top,
    .seed.size-large .seed__bottom { color: var(--off-black); opacity: 0.7; }

    .seed.size-med   { background: var(--cash-green); }
    .seed.size-small { background: #022d33; }
    .seed.size-tiny  { background: #01272d; opacity: 0.88; }

    .seed__top {
      font-weight: 500; font-size: 0.78rem;
      letter-spacing: 0.02em; opacity: 0.75;
      text-transform: lowercase;
    }
    .seed__balance {
      font-family: var(--font-display);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--electric-green);
    }
    .seed.size-huge  .seed__balance { font-size: 3rem; }
    .seed.size-large .seed__balance { font-size: 2.2rem; }
    .seed.size-med   .seed__balance { font-size: 1.65rem; }
    .seed.size-small .seed__balance { font-size: 1.3rem; }
    .seed.size-tiny  .seed__balance { font-size: 1.05rem; }
    .seed__balance .cents {
      font-size: 0.45em; opacity: 0.65; font-weight: 500;
      margin-left: 0.08em;
    }
    .seed__bottom {
      font-weight: 500; font-size: 0.78rem;
      opacity: 0.75; text-transform: lowercase;
    }

    /* ── Loading / error floating toast ───────────── */
    .toast {
      position: fixed;
      top: 38%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      color: var(--off-black);
      opacity: 0.55;
      font-size: 0.92rem;
      font-style: italic;
      pointer-events: none;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 0.7;  }
    }
    .toast--loading { animation: shimmer 1.8s ease-in-out infinite; }

    /* ── Modal (add-account flow) ────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(26,23,23,0.28);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: var(--vanilla);
      border-radius: 1.4rem;
      padding: 1.8rem 1.6rem 1.4rem;
      width: 100%;
      max-width: 26rem;
      box-shadow: 0 30px 80px -30px rgba(26,23,23,0.5);
      transform: translateY(12px) scale(0.98);
      transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
      max-height: calc(100dvh - 2.5rem);
      overflow-y: auto;
    }
    .modal-backdrop.is-open .modal { transform: translateY(0) scale(1); }
    .modal__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
      margin-bottom: 1.3rem;
      line-height: 1;
    }
    .modal__choices {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .modal__btn {
      width: 100%;
      padding: 0.95rem 1.2rem;
      border-radius: 14px;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0.005em;
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      text-align: center;
    }
    .modal__btn--primary {
      background: var(--cash-green);
      color: var(--vanilla);
    }
    .modal__btn--primary:hover { transform: translateY(-1px); background: #023239; }
    .modal__btn--secondary {
      background: transparent;
      color: var(--cash-green);
      border: 1.5px solid var(--cash-green);
    }
    .modal__btn--secondary:hover { background: rgba(1,71,81,0.06); }
    .modal__btn--tertiary {
      background: transparent;
      color: var(--off-black);
      opacity: 0.55;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
    }
    .modal__btn--tertiary:hover { opacity: 1; }
    .modal__btn:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 2px;
    }

    /* ── Manual form (inside modal) ────────────── */
    .manual-form { display: none; flex-direction: column; gap: 0.9rem; }
    .manual-form.is-visible { display: flex; }
    .modal__choices.is-hidden { display: none; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .field__label {
      font-size: 0.78rem;
      font-weight: 500;
      opacity: 0.7;
      text-transform: lowercase;
      letter-spacing: 0.01em;
    }
    .field__input {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border-radius: 12px;
      border: 1.5px solid rgba(26,23,23,0.12);
      background: rgba(252,250,242,0.6);
      font-family: inherit;
      font-size: 0.98rem;
      color: var(--off-black);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .field__input:focus {
      outline: none;
      border-color: var(--cash-green);
      background: #fff;
    }
    .field__input::placeholder { color: rgba(26,23,23,0.35); }

    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.15rem;
    }
    .quick-chip {
      padding: 0.3rem 0.7rem;
      border-radius: 100px;
      background: rgba(1,71,81,0.06);
      color: var(--cash-green);
      font-size: 0.78rem;
      font-weight: 500;
      transition: background 0.15s ease;
    }
    .quick-chip:hover, .quick-chip.is-active { background: rgba(1,71,81,0.15); }

    .form__actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }
    .form__actions .modal__btn { flex: 1; }

    .form__error {
      font-size: 0.78rem;
      color: #8a2a2a;
      min-height: 1.1em;
    }

    /* ── Reduced motion ─────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .seed, .seed.is-new { animation: none !important; transform: rotate(var(--rot)) !important; }
      .toast--loading { animation: none; }
      .modal, .modal-backdrop { transition: none !important; }
    }

    /* ── Mobile polish ──────────────────────────── */
    @media (max-width: 560px) {
      .chip--top-right { gap: 0.5rem; }
      .pill-phone { font-size: 0.72rem; }
      .add-btn--center { padding: 0.95rem 1.5rem; font-size: 0.98rem; }
      .modal__title { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <!-- Fixed viewport UI (does not pan/zoom) -->
  <a href="index.html" class="chip chip--wordmark" aria-label="cash bff home">cash bff</a>
  <div class="chip chip--top-right">
    <span class="pill-phone" id="phone-pill">+0 signed in</span>
    <button type="button" class="signout" id="signout">sign out</button>
  </div>

  <!-- Pan/zoom canvas -->
  <div class="viewport" id="viewport" role="application" aria-label="your cards workspace" tabindex="0">
    <div class="world" id="world"></div>
  </div>

  <!-- Floating loading toast (removed once cards render) -->
  <div class="toast toast--loading" id="loading-toast" aria-live="polite">settling in…</div>

  <!-- Central / corner add button. Single element, class swaps on card count. -->
  <button
    type="button"
    class="add-btn add-btn--center"
    id="add-account-btn"
    tabindex="0"
    aria-haspopup="dialog"
    aria-controls="add-modal"
  >+ add account</button>

  <!-- Add-account modal -->
  <div class="modal-backdrop" id="add-modal" role="dialog" aria-modal="true" aria-labelledby="add-modal-title" hidden>
    <div class="modal" id="add-modal-panel">
      <h2 class="modal__title" id="add-modal-title">add an account.</h2>

      <!-- Three-choice view -->
      <div class="modal__choices" id="modal-choices">
        <button type="button" class="modal__btn modal__btn--primary" id="choice-manual">manual</button>
        <button type="button" class="modal__btn modal__btn--secondary" id="choice-plaid">plaid</button>
        <button type="button" class="modal__btn modal__btn--tertiary" id="choice-close">close</button>
      </div>

      <!-- Manual form (hidden by default) -->
      <form class="manual-form" id="manual-form" novalidate>
        <div class="field">
          <label class="field__label" for="f-institution">institution</label>
          <input class="field__input" type="text" id="f-institution" name="institution" placeholder="chase, capital one, …" autocomplete="off" required>
          <div class="chips-row" id="institution-chips">
            <button type="button" class="quick-chip" data-v="Chase">chase</button>
            <button type="button" class="quick-chip" data-v="Capital One">capital one</button>
            <button type="button" class="quick-chip" data-v="Discover">discover</button>
            <button type="button" class="quick-chip" data-v="Credit One">credit one</button>
            <button type="button" class="quick-chip" data-v="Bank of America">bank of america</button>
            <button type="button" class="quick-chip" data-v="other">other</button>
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="f-mask">last 4</label>
          <input class="field__input" type="text" id="f-mask" name="mask" inputmode="numeric" pattern="\d{4}" maxlength="4" placeholder="1234" autocomplete="off" required>
        </div>

        <div class="field">
          <label class="field__label" for="f-balance">current balance</label>
          <input class="field__input" type="text" id="f-balance" name="balance" inputmode="decimal" placeholder="$0.00" autocomplete="off" required>
        </div>

        <div class="field">
          <label class="field__label" for="f-limit">credit limit</label>
          <input class="field__input" type="text" id="f-limit" name="limit" inputmode="decimal" placeholder="$0" autocomplete="off">
        </div>

        <div class="form__error" id="form-error" aria-live="polite"></div>

        <div class="form__actions">
          <button type="button" class="modal__btn modal__btn--tertiary" id="manual-back">back</button>
          <button type="submit" class="modal__btn modal__btn--primary" id="manual-submit">add it.</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/js/home.js" defer></script>
  <script src="/assets/js/add-account.js" defer></script>
</body>
</html>
