<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- Sentry browser SDK: forwards JS errors + unhandled rejections to our Sentry project. -->
  <script
    src="https://js.sentry-cdn.com/2d45e7a7cdc726451c61d775aa22fbf2.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="/assets/js/sentry-init.js"></script>
  <title>home · cash bff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    :root {
      --cash-green: #014751;
      --electric-green: #D3FFB4;
      --periwinkle: #C5B6F1;
      --off-black: #1A1717;
      --vanilla: #FCFAF2;
      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    /* ── Top bar (wordmark + signed-in pill) ───────── */
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem 0.5rem;
      max-width: 1200px;
      margin: 0 auto;
      gap: 1rem;
    }
    .wordmark {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
    }
    .top-right {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.4rem 0.8rem;
      border-radius: 100px;
      background: rgba(252,250,242,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(26,23,23,0.06);
      box-shadow: 0 2px 10px -6px rgba(26,23,23,0.25);
    }
    .pill-phone {
      color: var(--cash-green);
      font-weight: 500;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
    }
    .signout {
      opacity: 0.55;
      font-weight: 500;
      font-size: 0.78rem;
      transition: opacity 0.15s ease, color 0.15s ease;
    }
    .signout:hover { opacity: 1; color: var(--cash-green); }

    /* ── Calendar layout ───────────────────────────── */
    main {
      max-width: 72rem;
      margin: 0 auto;
      padding: 0.5rem 1.5rem 6rem;
    }

    .header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .month-nav {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }
    .month-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2.25rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
      text-transform: lowercase;
    }
    .arrow {
      font-size: 1.5rem;
      color: var(--cash-green);
      opacity: 0.5;
      cursor: pointer;
      padding: 0.25rem 0.6rem;
      transition: opacity 0.15s;
      user-select: none;
    }
    .arrow:hover { opacity: 1; }
    /* ── Header pill buttons (schedule + balances) ─── */
    /* Cluster the two pills on the right side of the header row so they sit
       side-by-side with a small gap. Wraps on tight viewports to stay tidy. */
    .header-pills {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .schedule-btn,
    .balances-btn {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.45rem 0.9rem;
      border-radius: 100px;
      background: transparent;
      color: var(--cash-green);
      border: 1px solid rgba(1, 71, 81, 0.28);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      letter-spacing: 0.01em;
    }
    .schedule-btn:hover,
    .balances-btn:hover {
      background: rgba(1, 71, 81, 0.05);
      border-color: var(--cash-green);
    }
    .schedule-btn:focus-visible,
    .balances-btn:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 3px;
    }

    /* Placeholder popup — same paper-tint + feel as the day popover. */
    .schedule-overlay {
      position: fixed; inset: 0;
      background: rgba(26, 23, 23, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 40;
    }
    .schedule-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .schedule-pop {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      opacity: 0;
      pointer-events: none;
      background: #F3EAD6;
      border: 1px solid rgba(1, 71, 81, 0.12);
      border-radius: 0.85rem;
      padding: 1.5rem 1.5rem 1.25rem;
      max-width: 22rem;
      width: calc(100% - 2.5rem);
      box-shadow: 0 16px 40px rgba(26, 23, 23, 0.18);
      transition: transform 0.18s ease, opacity 0.18s ease;
      z-index: 41;
    }
    .schedule-pop.open {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }
    .schedule-pop h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--cash-green);
      letter-spacing: -0.01em;
      margin-bottom: 0.85rem;
    }
    .schedule-pop p {
      font-size: 0.88rem;
      color: var(--off-black);
      opacity: 0.7;
      line-height: 1.45;
      margin-bottom: 1.1rem;
    }
    .schedule-pop .schedule-close {
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--cash-green);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.25rem 0;
      opacity: 0.7;
      transition: opacity 0.15s ease;
      align-self: flex-start;
    }
    .schedule-pop .schedule-close:hover { opacity: 1; }

    /* ── Schedule form (replaces the placeholder body) ─── */
    .schedule-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .schedule-form .field { gap: 0.3rem; }
    .schedule-form .field__label {
      font-size: 0.74rem;
      font-weight: 500;
      opacity: 0.7;
      text-transform: lowercase;
      letter-spacing: 0.01em;
    }
    .schedule-form .field__input,
    .schedule-form .field__select,
    .schedule-form .field__textarea {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      border: 1.5px solid rgba(26,23,23,0.12);
      background: rgba(252,250,242,0.8);
      font-family: inherit;
      font-size: 0.92rem;
      color: var(--off-black);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .schedule-form .field__input:focus,
    .schedule-form .field__select:focus,
    .schedule-form .field__textarea:focus {
      outline: none;
      border-color: var(--cash-green);
      background: #fff;
    }
    .schedule-form .field__textarea {
      resize: vertical;
      min-height: 2.6rem;
      line-height: 1.4;
    }
    .schedule-form .field__select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      cursor: pointer;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath fill='none' stroke='%23014751' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round' d='M1 1l5 5 5-5'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 0.75rem center;
      padding-right: 2rem;
    }
    /* "$" prefix on amount input. */
    .schedule-form .field--amount { position: relative; }
    .schedule-form .field--amount .amount-prefix {
      position: absolute;
      left: 0.75rem;
      bottom: 0.55rem;
      font-size: 0.92rem;
      color: var(--cash-green);
      opacity: 0.65;
      pointer-events: none;
      font-weight: 500;
    }
    .schedule-form .field--amount .field__input { padding-left: 1.45rem; }

    /* Type chips — match calendar pill colors per type. */
    .type-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    .type-chip {
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.32rem 0.7rem;
      border-radius: 100px;
      background: transparent;
      color: var(--off-black);
      border: 1px solid rgba(1, 71, 81, 0.22);
      opacity: 0.7;
      cursor: pointer;
      transition: opacity 0.15s ease, background 0.15s ease,
                  color 0.15s ease, border-color 0.15s ease;
    }
    .type-chip:hover { opacity: 1; }
    .type-chip[data-type="bill"].is-active {
      background: var(--cash-green);
      color: var(--vanilla);
      border-color: var(--cash-green);
      opacity: 1;
    }
    .type-chip[data-type="sub"].is-active {
      background: var(--vanilla);
      color: var(--off-black);
      border: 1px solid var(--cash-green);
      opacity: 1;
    }
    .type-chip[data-type="planned"].is-active {
      background: transparent;
      color: var(--off-black);
      border: 1px dashed var(--cash-green);
      font-style: italic;
      opacity: 1;
    }
    .type-chip[data-type="spent"].is-active {
      background: var(--vanilla);
      color: var(--cash-green);
      border: 1px solid rgba(1, 71, 81, 0.18);
      opacity: 0.85;
    }
    .type-chip:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 2px;
    }

    .schedule-form .form__error {
      font-size: 0.78rem;
      color: #8a2a2a;
      min-height: 0;
    }
    .schedule-form .form__error:empty { display: none; }

    .schedule-form .form__actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.2rem;
    }
    .schedule-submit {
      flex: 1;
      padding: 0.7rem 1rem;
      border-radius: 12px;
      background: var(--cash-green);
      color: var(--vanilla);
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.005em;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
    }
    .schedule-submit:hover { transform: translateY(-1px); background: #023239; }
    .schedule-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      background: var(--cash-green);
    }
    .schedule-submit:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 2px;
    }

    /* ── Balances popup (mirrors schedule-pop paper-tint + animation) ── */
    .balances-overlay {
      position: fixed; inset: 0;
      background: rgba(26, 23, 23, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 40;
    }
    .balances-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .balances-pop {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      opacity: 0;
      pointer-events: none;
      background: #F3EAD6;
      border: 1px solid rgba(1, 71, 81, 0.12);
      border-radius: 0.85rem;
      padding: 1.5rem 1.5rem 1.25rem;
      max-width: 24rem;
      width: calc(100% - 2.5rem);
      max-height: min(80vh, 36rem);
      overflow-y: auto;
      box-shadow: 0 16px 40px rgba(26, 23, 23, 0.18);
      transition: transform 0.18s ease, opacity 0.18s ease;
      z-index: 41;
    }
    .balances-pop.open {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }
    .balances-pop h2 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--cash-green);
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
    }
    /* Summary line under the heading — quiet, brand-voice tone. */
    .balances-summary {
      font-size: 0.82rem;
      color: var(--off-black);
      opacity: 0.7;
      line-height: 1.4;
      margin-bottom: 1rem;
    }
    .balances-summary.is-muted-italic {
      font-style: italic;
      opacity: 0.55;
    }
    .balances-groups {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .balances-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .balances-group__heading {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--cash-green);
      letter-spacing: 0;
      text-transform: lowercase;
      opacity: 0.85;
    }
    .balances-list { display: flex; flex-direction: column; gap: 0.35rem; }
    .balance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.65rem 0.5rem 0.75rem;
      background: var(--vanilla);
      border: 1px solid rgba(1, 71, 81, 0.05);
      border-left: 3px solid transparent;
      border-radius: 0.4rem;
    }
    .balance-row.is-credit { border-left-color: var(--periwinkle); }
    .balance-row.is-depository { border-left-color: #DFEDE0; }
    .balance-row__label {
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--off-black);
      line-height: 1.3;
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .balance-row__amt {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--cash-green);
      white-space: nowrap;
    }
    .balances-asof {
      font-size: 0.72rem;
      opacity: 0.5;
      margin-top: 0.9rem;
      font-style: italic;
    }
    .balances-status {
      font-size: 0.85rem;
      font-style: italic;
      opacity: 0.55;
      padding: 0.5rem 0;
    }
    .balances-pop .balances-close {
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--cash-green);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.25rem 0;
      opacity: 0.7;
      transition: opacity 0.15s ease;
      align-self: flex-start;
      margin-top: 0.9rem;
    }
    .balances-pop .balances-close:hover { opacity: 1; }

    .weekday-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.45;
      margin-bottom: 0.5rem;
      padding: 0 0.25rem;
    }
    .weekday-row span { padding: 0.35rem 0.5rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.35rem;
      border-radius: 0.6rem;
    }
    .cell {
      min-height: 6.5rem;
      background: rgba(1, 71, 81, 0.025);
      border-radius: 0.5rem;
      padding: 0.4rem 0.45rem 0.5rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .cell:hover {
      background: rgba(211, 255, 180, 0.45);
      transform: translateY(-1px);
    }
    .cell.off-month { opacity: 0.35; background: transparent; }
    .cell.today .date {
      background: var(--electric-green);
      color: var(--cash-green);
      padding: 0 0.35rem;
      border-radius: 0.25rem;
      font-weight: 700;
    }
    .cell .date {
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--cash-green);
      margin-bottom: 0.1rem;
      align-self: flex-start;
    }
    .pill {
      font-size: 0.66rem;
      padding: 0.15rem 0.4rem;
      border-radius: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
      font-weight: 500;
    }
    .pill.bill { background: var(--cash-green); color: var(--vanilla); }
    .pill.cc   { background: var(--periwinkle); color: var(--off-black); }
    .pill.sub  { background: var(--vanilla); color: var(--off-black); border: 1px solid var(--cash-green); }
    .pill.planned {
      background: transparent;
      color: var(--off-black);
      border: 1px dashed var(--cash-green);
      font-style: italic;
      opacity: 0.75;
    }
    .pill.income {
      /* soft sage wash — quiet "positive" feel, not candy-bright */
      background: #DFEDE0;
      color: var(--cash-green);
      font-weight: 500;
    }
    .pill.spent {
      /* Muted, low-contrast — uncategorized everyday spending, reads as
         "a thing that happened" rather than a commitment. Distinct from
         .sub (solid border, full opacity). */
      background: var(--vanilla);
      color: var(--cash-green);
      border: 1px solid rgba(1, 71, 81, 0.18);
      opacity: 0.85;
    }
    /* Pending-transaction styling: italic signals "about to settle" without
       changing color. Applied to both the cell pill and the drawer row name. */
    .pill.pending-tx,
    .drawer-item.pending-tx .name { font-style: italic; }
    .overflow {
      font-size: 0.66rem;
      opacity: 0.5;
      font-weight: 500;
      padding: 0 0.4rem;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      opacity: 0.7;
      justify-content: center;
    }
    .legend-item { display: inline-flex; align-items: center; gap: 0.45rem; }
    .swatch {
      width: 0.85rem; height: 0.85rem; border-radius: 0.2rem;
    }
    .swatch.bill { background: var(--cash-green); }
    .swatch.cc { background: var(--periwinkle); }
    .swatch.sub { background: var(--vanilla); border: 1px solid var(--cash-green); }
    .swatch.planned { background: transparent; border: 1px dashed var(--cash-green); }
    .swatch.spent { background: var(--vanilla); border: 1px solid rgba(1, 71, 81, 0.18); opacity: 0.85; }

    /* ── Day popover (anchored, light, calm) ──────── */
    /* Transparent overlay just captures click-outside; no dimming, nothing heavy. */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: transparent;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }
    .drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .drawer {
      position: fixed;
      /* top/left set by JS, anchored near the clicked cell */
      top: 0; left: 0;
      /* Warm paper tint — distinct from calendar vanilla, still calm. */
      background: #F3EAD6;
      border-radius: 0.85rem;
      padding: 1rem 1.15rem 1.1rem;
      min-width: 13rem;
      max-width: 19rem;
      max-height: min(60vh, 32rem);
      overflow-y: auto;
      transform: scale(0.96) translateY(2px);
      transform-origin: top center;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.18s ease, opacity 0.18s ease;
      z-index: 11;
      box-shadow: 0 12px 32px rgba(26, 23, 23, 0.14);
      border: 1px solid rgba(1, 71, 81, 0.12);
    }
    .drawer.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .drawer-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 0.7rem;
      gap: 0.5rem;
    }
    .drawer-date {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--cash-green);
      letter-spacing: -0.01em;
    }
    .drawer-total {
      font-size: 0.78rem;
      opacity: 0.6;
      margin-bottom: 0.35rem;
    }
    .drawer-total strong { color: var(--cash-green); opacity: 1; font-weight: 600; }
    .drawer-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .drawer-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0.45rem 0.55rem;
      border-radius: 0.4rem;
      /* inner rows sit on vanilla so they read as "notes on paper" */
      background: var(--vanilla);
      border: 1px solid rgba(1, 71, 81, 0.05);
      gap: 0.6rem;
    }
    .drawer-item .row-main {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      min-width: 0;
      flex: 1;
    }
    .drawer-item .name { font-weight: 500; font-size: 0.82rem; line-height: 1.25; }
    .drawer-item .name small { opacity: 0.5; font-weight: 400; margin-left: 0.3rem; font-size: 0.66rem; display: block; margin-top: 0.1rem; }
    .drawer-item .from-card {
      font-size: 0.65rem;
      opacity: 0.5;
      line-height: 1.3;
    }
    .drawer-item .note {
      font-size: 0.75rem;
      font-style: italic;
      opacity: 0.6;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .drawer-item .amt { font-family: var(--font-display); font-weight: 500; font-size: 0.95rem; color: var(--cash-green); white-space: nowrap; }
    .drawer-empty { opacity: 0.5; font-style: italic; padding: 0.4rem 0.2rem; text-align: center; font-size: 0.82rem; }
    .drawer-close {
      border: none; background: transparent;
      color: var(--off-black); opacity: 0.4;
      cursor: pointer; font-size: 1rem;
      padding: 0 0.25rem;
      line-height: 1;
    }
    .drawer-close:hover { opacity: 0.8; }

    /* On small screens, center the popover and give it breathing room. */
    @media (max-width: 520px) {
      .drawer {
        left: 1rem !important;
        right: 1rem !important;
        top: auto !important;
        bottom: 1.25rem !important;
        max-width: none;
        width: auto;
        transform-origin: bottom center;
      }
    }

    /* ── Floating add-account button (bottom-center) ─ */
    .add-btn {
      position: fixed;
      z-index: 25;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.85rem 1.5rem;
      font-size: 0.95rem;
      font-family: var(--font-body);
      font-weight: 600;
      letter-spacing: 0.01em;
      background: var(--electric-green);
      color: var(--off-black);
      border-radius: 100px;
      box-shadow: 0 10px 28px -12px rgba(1,71,81,0.4);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .add-btn:hover {
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 16px 36px -14px rgba(1,71,81,0.5);
      background: #c6f6a3;
    }
    .add-btn:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 3px;
    }

    /* ── Add-account modal (unchanged markup + styles) ─ */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(26,23,23,0.28);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: var(--vanilla);
      border-radius: 1.4rem;
      padding: 1.8rem 1.6rem 1.4rem;
      width: 100%;
      max-width: 26rem;
      box-shadow: 0 30px 80px -30px rgba(26,23,23,0.5);
      transform: translateY(12px) scale(0.98);
      transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
      max-height: calc(100dvh - 2.5rem);
      overflow-y: auto;
    }
    .modal-backdrop.is-open .modal { transform: translateY(0) scale(1); }
    .modal__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
      margin-bottom: 1.3rem;
      line-height: 1;
    }
    .modal__choices {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .modal__btn {
      width: 100%;
      padding: 0.95rem 1.2rem;
      border-radius: 14px;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0.005em;
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      text-align: center;
    }
    .modal__btn--primary {
      background: var(--cash-green);
      color: var(--vanilla);
    }
    .modal__btn--primary:hover { transform: translateY(-1px); background: #023239; }
    .modal__btn--secondary {
      background: transparent;
      color: var(--cash-green);
      border: 1.5px solid var(--cash-green);
    }
    .modal__btn--secondary:hover { background: rgba(1,71,81,0.06); }
    .modal__btn--tertiary {
      background: transparent;
      color: var(--off-black);
      opacity: 0.55;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
    }
    .modal__btn--tertiary:hover { opacity: 1; }
    .modal__btn:focus-visible {
      outline: 2px solid var(--cash-green);
      outline-offset: 2px;
    }

    /* ── Manual form (inside add-account modal) ──── */
    .manual-form { display: none; flex-direction: column; gap: 0.9rem; }
    .manual-form.is-visible { display: flex; }
    .modal__choices.is-hidden { display: none; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .field__label {
      font-size: 0.78rem;
      font-weight: 500;
      opacity: 0.7;
      text-transform: lowercase;
      letter-spacing: 0.01em;
    }
    .field__input {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border-radius: 12px;
      border: 1.5px solid rgba(26,23,23,0.12);
      background: rgba(252,250,242,0.6);
      font-family: inherit;
      font-size: 0.98rem;
      color: var(--off-black);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .field__input:focus {
      outline: none;
      border-color: var(--cash-green);
      background: #fff;
    }
    .field__input::placeholder { color: rgba(26,23,23,0.35); }

    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.15rem;
    }
    .quick-chip {
      padding: 0.3rem 0.7rem;
      border-radius: 100px;
      background: rgba(1,71,81,0.06);
      color: var(--cash-green);
      font-size: 0.78rem;
      font-weight: 500;
      transition: background 0.15s ease;
    }
    .quick-chip:hover, .quick-chip.is-active { background: rgba(1,71,81,0.15); }

    .form__actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }
    .form__actions .modal__btn { flex: 1; }

    .form__error {
      font-size: 0.78rem;
      color: #8a2a2a;
      min-height: 1.1em;
    }

    /* Accessibility helper: hide text visually but keep it for screen readers. */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Reduced motion ──────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .drawer, .drawer-overlay, .cell, .arrow, .add-btn { transition: none; }
      .modal, .modal-backdrop { transition: none !important; }
    }

    /* ── Mobile polish ───────────────────────────── */
    @media (max-width: 640px) {
      .bar { padding: 0.8rem 1rem 0.4rem; }
      main { padding: 0.25rem 0.75rem 6rem; }
      .month-title { font-size: 1.75rem; }
      .cell { min-height: 5rem; padding: 0.3rem 0.3rem 0.4rem; }
      .pill { font-size: 0.58rem; padding: 0.12rem 0.3rem; }
      .cell .date { font-size: 0.75rem; }
      .pill-phone { font-size: 0.72rem; }
      .add-btn { padding: 0.75rem 1.25rem; font-size: 0.88rem; }
    }
  </style>
</head>
<body>
  <header class="bar">
    <a class="wordmark" href="/" aria-label="cash bff home">cash bff</a>
    <div class="top-right">
      <span class="pill-phone" id="phone-pill">+0 signed in</span>
      <button type="button" class="signout" id="signout">sign out</button>
    </div>
  </header>

  <main>
    <div class="header-row">
      <div class="month-nav">
        <span class="arrow" id="prev-month" aria-label="previous month">&lsaquo;</span>
        <h1 class="month-title" id="month-title">april 2026</h1>
        <span class="arrow" id="next-month" aria-label="next month">&rsaquo;</span>
      </div>
      <div class="header-pills">
        <button class="schedule-btn" id="schedule-btn" type="button">+ schedule spend</button>
        <button class="balances-btn" id="balances-btn" type="button" aria-haspopup="dialog" aria-controls="balances-pop">balances</button>
      </div>
    </div>

    <!-- Schedule spend popup — real form, posts to /api/transactions/schedule. -->
    <div class="schedule-overlay" id="schedule-overlay"></div>
    <aside class="schedule-pop" id="schedule-pop" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="schedule-pop-title">
      <h2 id="schedule-pop-title">schedule a spend</h2>
      <form class="schedule-form" id="schedule-form" novalidate>
        <div class="field">
          <label class="field__label" for="sched-date">date</label>
          <input class="field__input" type="date" id="sched-date" name="date" required>
        </div>

        <div class="field field--amount">
          <label class="field__label" for="sched-amount">amount</label>
          <span class="amount-prefix" aria-hidden="true">$</span>
          <input class="field__input" type="number" id="sched-amount" name="amount" step="0.01" min="0" inputmode="decimal" placeholder="0.00" required>
        </div>

        <div class="field">
          <label class="field__label" for="sched-name">name</label>
          <input class="field__input" type="text" id="sched-name" name="name" maxlength="80" placeholder="rent · netflix · etc" autocomplete="off" required>
        </div>

        <div class="field">
          <span class="field__label">type</span>
          <div class="type-chips" id="sched-type-chips" role="radiogroup" aria-label="transaction type">
            <button type="button" class="type-chip" data-type="bill" role="radio" aria-checked="false">bill</button>
            <button type="button" class="type-chip" data-type="sub" role="radio" aria-checked="false">sub</button>
            <button type="button" class="type-chip is-active" data-type="planned" role="radio" aria-checked="true">planned</button>
            <button type="button" class="type-chip" data-type="spent" role="radio" aria-checked="false">spent</button>
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="sched-card">card</label>
          <select class="field__select" id="sched-card" name="card_account_id">
            <option value="">no card / not linked</option>
          </select>
        </div>

        <div class="field">
          <label class="field__label" for="sched-note">note</label>
          <textarea class="field__textarea" id="sched-note" name="note" maxlength="280" rows="2" placeholder="anything to remember…"></textarea>
        </div>

        <div class="form__error" id="sched-error" aria-live="polite"></div>

        <div class="form__actions">
          <button type="submit" class="schedule-submit" id="sched-submit">+ schedule it</button>
        </div>
      </form>
      <button class="schedule-close" id="schedule-close" type="button">close</button>
    </aside>

    <!-- Balances popup — read-only list of all linked accounts + summary. -->
    <div class="balances-overlay" id="balances-overlay"></div>
    <aside class="balances-pop" id="balances-pop" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="balances-pop-title">
      <h2 id="balances-pop-title">balances</h2>
      <div class="balances-summary" id="balances-summary"></div>
      <div class="balances-status" id="balances-status" aria-live="polite"></div>
      <div class="balances-groups" id="balances-groups"></div>
      <div class="balances-asof" id="balances-asof"></div>
      <button class="balances-close" id="balances-close" type="button">close</button>
    </aside>

    <div class="weekday-row" aria-hidden="true">
      <span>sun</span><span>mon</span><span>tue</span><span>wed</span><span>thu</span><span>fri</span><span>sat</span>
    </div>

    <div class="grid" id="grid" role="grid" aria-label="month calendar"></div>

    <div class="legend">
      <span class="legend-item"><span class="swatch bill"></span>bill</span>
      <span class="legend-item"><span class="swatch cc"></span>card minimum</span>
      <span class="legend-item"><span class="swatch sub"></span>subscription</span>
      <span class="legend-item"><span class="swatch spent"></span>spent</span>
      <span class="legend-item"><span class="swatch planned"></span>planned &middot; uncertain</span>
    </div>
  </main>

  <!-- Floating add-account button (bottom-center) -->
  <button
    type="button"
    class="add-btn"
    id="add-account-btn"
    tabindex="0"
    aria-haspopup="dialog"
    aria-controls="add-modal"
  >+ add account</button>

  <!-- Day detail drawer -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <div class="drawer-date" id="drawer-date"></div>
        <div class="drawer-total" id="drawer-total"></div>
      </div>
      <button class="drawer-close" id="drawer-close" aria-label="close">&times;</button>
    </div>
    <div class="drawer-list" id="drawer-list"></div>
  </aside>

  <!-- Add-account modal (markup consumed by add-account.js) -->
  <div class="modal-backdrop" id="add-modal" role="dialog" aria-modal="true" aria-labelledby="add-modal-title" hidden>
    <div class="modal" id="add-modal-panel">
      <h2 class="modal__title" id="add-modal-title">add an account.</h2>

      <!-- Three-choice view -->
      <div class="modal__choices" id="modal-choices">
        <button type="button" class="modal__btn modal__btn--primary" id="choice-manual">manual</button>
        <button type="button" class="modal__btn modal__btn--secondary" id="choice-plaid">plaid</button>
        <button type="button" class="modal__btn modal__btn--tertiary" id="choice-close">close</button>
      </div>

      <!-- Manual form (hidden by default) -->
      <form class="manual-form" id="manual-form" novalidate>
        <div class="field">
          <label class="field__label" for="f-institution">institution</label>
          <input class="field__input" type="text" id="f-institution" name="institution" placeholder="chase, capital one, …" autocomplete="off" required>
          <div class="chips-row" id="institution-chips">
            <button type="button" class="quick-chip" data-v="Chase">chase</button>
            <button type="button" class="quick-chip" data-v="Capital One">capital one</button>
            <button type="button" class="quick-chip" data-v="Discover">discover</button>
            <button type="button" class="quick-chip" data-v="Credit One">credit one</button>
            <button type="button" class="quick-chip" data-v="Bank of America">bank of america</button>
            <button type="button" class="quick-chip" data-v="other">other</button>
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="f-mask">last 4</label>
          <input class="field__input" type="text" id="f-mask" name="mask" inputmode="numeric" pattern="\d{4}" maxlength="4" placeholder="1234" autocomplete="off" required>
        </div>

        <div class="field">
          <label class="field__label" for="f-balance">current balance</label>
          <input class="field__input" type="text" id="f-balance" name="balance" inputmode="decimal" placeholder="$0.00" autocomplete="off" required>
        </div>

        <div class="field">
          <label class="field__label" for="f-limit">credit limit</label>
          <input class="field__input" type="text" id="f-limit" name="limit" inputmode="decimal" placeholder="$0" autocomplete="off">
        </div>

        <div class="form__error" id="form-error" aria-live="polite"></div>

        <div class="form__actions">
          <button type="button" class="modal__btn modal__btn--tertiary" id="manual-back">back</button>
          <button type="submit" class="modal__btn modal__btn--primary" id="manual-submit">add it.</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/js/home.js" defer></script>
  <script src="/assets/js/add-account.js" defer></script>
</body>
</html>
