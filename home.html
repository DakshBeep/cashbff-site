<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="apple-touch-icon" href="/icon.png">
  <meta name="theme-color" content="#014751">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- Sentry browser SDK: forwards JS errors + unhandled rejections to our Sentry project. -->
  <script
    src="https://js.sentry-cdn.com/2d45e7a7cdc726451c61d775aa22fbf2.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="/assets/js/sentry-init.js"></script>

  <title>cashbff — you're in.</title>
  <meta name="description" content="signed in. open cashbff in claude.">
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- PostHog product analytics. Hybrid mode: backend tracks business events,
       browser handles autocapture + pageviews. CSP-safe (no eval). -->
  <script src="/assets/js/posthog-init.js" defer></script>

  <!-- Vercel Analytics + Speed Insights — cookieless edge-collected pageviews + web vitals. -->
  <script src="/assets/js/vercel-analytics-init.js" defer></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script src="/assets/js/vercel-speed-insights-init.js" defer></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500;
      font-display: swap;
    }

    /* B&W brand. cash-green is used ONLY on .period spans + the wordmark.
       everything else is monochrome. */
    :root {
      --vanilla: #FCFAF2;
      --off-black: #1A1717;
      --cash-green: #014751;
      --hairline: rgba(26, 23, 23, 0.12);
      --soft-ink: rgba(26, 23, 23, 0.62);

      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    .stage {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── top bar ── */
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin-bottom: 5rem;
    }
    .wordmark {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
      text-transform: lowercase;
    }
    .logout-btn {
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.7;
      padding: 0;
      background: none;
      color: inherit;
      letter-spacing: -0.005em;
      transition: opacity .15s;
    }
    .logout-btn:hover { opacity: 1; }
    .logout-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── hero ── */
    .hero {
      text-align: left;
      margin: 0 0 2.25rem;
      opacity: 0;
      animation: fadeIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
    }
    .hero[hidden] { display: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .headline {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2.8rem, 9vw, 5.25rem);
      line-height: 0.93;
      letter-spacing: -0.02em;
      text-transform: lowercase;
      color: var(--off-black);
      margin-bottom: 1.1rem;
    }
    .headline .period { color: var(--cash-green); }
    .signed-in {
      font-size: clamp(0.95rem, 1.6vw, 1.05rem);
      opacity: 0.65;
      line-height: 1.5;
    }

    /* ── CTA stack ── */
    .cta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.85rem;
      margin: 0 0 4rem;
      opacity: 0;
      animation: fadeIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }
    .cta[hidden] { display: none; }
    .btn-primary {
      background: var(--off-black);
      color: var(--vanilla);
      font-weight: 700;
      font-size: 1.1rem;
      padding: 1.05rem 2rem;
      border-radius: 14px;
      text-transform: lowercase;
      letter-spacing: -0.005em;
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      transition: transform .12s ease, opacity .15s;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary .arrow { font-size: 1.15rem; }

    .cta-helper {
      font-size: 0.95rem;
      opacity: 0.6;
      line-height: 1.5;
      max-width: 32rem;
    }
    .cta-helper:empty { display: none; }

    /* loading slug — visible until /api/me resolves so the page doesn't
       flash empty. monochrome, low opacity, no spinner. */
    .loading {
      font-size: 0.95rem;
      opacity: 0.4;
      margin: 0 0 4rem;
    }
    .loading[hidden] { display: none; }

    .toast {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: var(--off-black);
      color: var(--vanilla);
      padding: 0.75rem 1.1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      max-width: 22rem;
      z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── banks list ── */
    .banks {
      margin: 0 0 4rem;
    }
    .banks[hidden] { display: none; }
    .banks__eyebrow {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      opacity: 0.55;
      margin-bottom: 0.85rem;
      text-transform: lowercase;
    }
    .banks__list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin: 0 0 1rem;
      padding: 0;
    }
    .banks__item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: -0.005em;
      text-transform: lowercase;
    }
    .banks__mask {
      font-variant-numeric: tabular-nums;
      opacity: 0.5;
      font-size: 0.9rem;
      font-weight: 400;
    }
    .banks__add {
      display: inline-block;
      font-size: 0.9rem;
      opacity: 0.7;
      text-decoration: underline;
      text-decoration-color: var(--hairline);
      text-underline-offset: 3px;
      transition: text-decoration-color .15s, opacity .15s;
    }
    .banks__add:hover { text-decoration-color: var(--off-black); opacity: 1; }

    /* ── manage subscription row ── */
    .manage {
      margin: 0 0 4rem;
    }
    .manage[hidden] { display: none; }
    .manage a {
      font-size: 0.95rem;
      opacity: 0.7;
      text-decoration: underline;
      text-decoration-color: var(--hairline);
      text-underline-offset: 3px;
      transition: text-decoration-color .15s, opacity .15s;
    }
    .manage a:hover { text-decoration-color: var(--off-black); opacity: 1; }

    /* ── footer ── */
    .footer {
      margin-top: auto;
      padding-top: 2.5rem;
      font-size: 0.85rem;
      opacity: 0.5;
      line-height: 1.7;
      border-top: 1px solid var(--hairline);
      text-align: left;
    }
    .footer a {
      text-decoration: underline;
      text-decoration-color: var(--hairline);
      text-underline-offset: 3px;
      transition: text-decoration-color .15s, opacity .15s;
    }
    .footer a:hover { text-decoration-color: var(--off-black); opacity: 1; }
    .footer .sep { margin: 0 0.5rem; opacity: 0.5; }

    /* ── 360px guard ── */
    @media (max-width: 380px) {
      .stage { padding: 1.25rem 1.1rem 3rem; }
      .bar { margin-bottom: 3.5rem; }
      .btn-primary { font-size: 1rem; padding: 0.95rem 1.6rem; }
    }

    /* ── reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="stage">

    <header class="bar">
      <a href="/" class="wordmark">cashbff</a>
      <button class="logout-btn" id="logout-btn" type="button">logout</button>
    </header>

    <!-- Loading slug — visible until /api/me resolves. JS hides it on render
         (or redirects to /signup on 401). -->
    <p class="loading" id="loading">loading...</p>

    <section class="hero" id="hero" hidden>
      <h1 class="headline">
        you're in<span class="period">.</span>
      </h1>
      <p class="signed-in">signed in as <span id="phone-mask">+1 (***) ***-****</span>.</p>
    </section>

    <section class="cta" id="cta" hidden>
      <!-- The primary button's href + text + id are filled in by home-status.js
           based on (talk_status, has_bank). For the "open in claude" path the
           handler does window.open + clipboard write (mirrors talk.js#onAddClick).
           For the trial / plaid paths the JS sets href + lets the browser
           navigate normally. -->
      <a class="btn-primary" id="primary-cta" href="/signup">
        <span id="primary-cta-label">continue</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <p class="cta-helper" id="cta-helper"></p>
    </section>

    <section class="banks" id="banks" hidden aria-label="linked banks">
      <p class="banks__eyebrow">linked.</p>
      <ul class="banks__list" id="banks-list"></ul>
      <a class="banks__add" href="/signup?step=plaid">add another bank →</a>
    </section>

    <section class="manage" id="manage" hidden>
      <a href="https://billing.stripe.com/p/login/test_28o00g8oH3JB1pK000" target="_blank" rel="noopener noreferrer">manage your subscription →</a>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite">URL copied. paste it in the claude.ai dialog.</div>

    <footer class="footer">
      <a href="/privacy">privacy</a><span class="sep">·</span><a href="/terms">terms</a><span class="sep">·</span><a href="/pricing">pricing</a><span class="sep">·</span>Built by <a href="https://khannadaksh.com" rel="me">Daksh Khanna</a><span class="sep">·</span>Khanna's LLC
    </footer>

  </main>

  <!-- auth-banner.js is loaded site-wide. It null-checks the page and bails
       if there's no auth-banner div, so it's harmless here even though we
       render the user's status inline rather than via the floating pill. -->
  <script src="/assets/js/auth-banner.js" defer></script>
  <!-- home-status.js: small (no-dependency) state machine for this page.
       Handles /api/me load, primary CTA wiring, logout, and "open in claude"
       click (mirrors talk.js#onAddClick). -->
  <script src="/assets/js/home-status.js" defer></script>
</body>
</html>
