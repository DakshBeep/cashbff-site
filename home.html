<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>home · cash bff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    :root {
      --cash-green: #014751;
      --electric-green: #D3FFB4;
      --periwinkle: #C5B6F1;
      --off-black: #1A1717;
      --vanilla: #FCFAF2;
      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── Top bar ───────────────────────────────────── */
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.75rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .wordmark {
      font-family: var(--font-display);
      font-weight: 700; font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
    }
    .bar__right {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      font-size: 0.82rem;
    }
    .pill-phone {
      background: rgba(1,71,81,0.08);
      color: var(--cash-green);
      padding: 0.45rem 0.85rem;
      border-radius: 100px;
      font-weight: 500;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
    }
    .signout {
      opacity: 0.55;
      font-weight: 500;
      transition: opacity 0.15s ease, color 0.15s ease;
    }
    .signout:hover { opacity: 1; color: var(--cash-green); }

    /* ── The single artifact ──────────────────────── */
    main {
      min-height: calc(100dvh - 7rem - 4rem);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
    }

    .card-wrap {
      perspective: 1400px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: min(30rem, 90vw);
      aspect-ratio: 1.586 / 1;
      background: var(--cash-green);
      border-radius: 1.25rem;
      color: var(--vanilla);
      transform: rotate(-3deg);
      box-shadow:
        0 30px 60px -20px rgba(26, 23, 23, 0.35),
        0 12px 24px -10px rgba(1, 71, 81, 0.35),
        inset 0 0 0 1px rgba(213, 255, 180, 0.08);
      animation:
        cardIn 0.8s cubic-bezier(0.34, 1.2, 0.64, 1) both,
        cardFloat 7s ease-in-out 1s infinite;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: rotate(-3deg) translateY(28px) scale(0.96); }
      to   { opacity: 1; transform: rotate(-3deg) translateY(0) scale(1); }
    }
    @keyframes cardFloat {
      0%, 100% { transform: rotate(-3deg) translateY(0); }
      50%      { transform: rotate(-3deg) translateY(-5px); }
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(120% 80% at 10% 0%, rgba(213, 255, 180, 0.07), transparent 60%);
      pointer-events: none;
    }

    /* Magstripe — the card-back signature */
    .magstripe {
      width: 100%;
      height: 22%;
      margin-top: 9%;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0.85) 0%,
          var(--off-black) 35%,
          var(--off-black) 65%,
          rgba(0,0,0,0.88) 100%);
      position: relative;
      flex-shrink: 0;
    }
    .magstripe::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 3px,
        rgba(255, 255, 255, 0.02) 3px,
        rgba(255, 255, 255, 0.02) 4px
      );
      pointer-events: none;
    }

    .card__body {
      flex: 1;
      padding: 1.25rem 1.5rem 1.35rem;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .card__label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.62rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--electric-green);
      opacity: 0.85;
      margin-top: 0.35rem;
    }

    .card__amount {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(2.5rem, 6.5vw, 3.75rem);
      line-height: 1;
      letter-spacing: -0.015em;
      color: var(--vanilla);
      margin: auto 0;
      transition: opacity 0.3s ease;
    }
    .card__amount.loading { opacity: 0.25; }
    .card__amount .cents {
      font-size: 0.55em;
      opacity: 0.55;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-left: 0.05em;
    }
    .card__amount .stop {
      color: var(--periwinkle);
      font-size: 0.55em;
      opacity: 0.85;
      margin-left: 0.02em;
    }

    .card__meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }
    .card__brand {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 0.92rem;
      letter-spacing: -0.01em;
      opacity: 0.92;
    }
    .card__across {
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.01em;
      opacity: 0.55;
      font-weight: 500;
    }

    /* Error state — quiet, no red */
    .card__amount.err {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      opacity: 0.6;
      font-style: italic;
      font-weight: 500;
    }

    /* ── Footer ────────────────────────────────────── */
    .page-foot {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      font-size: 0.72rem;
      opacity: 0.35;
      padding: 1.5rem 2rem 2rem;
    }
    .page-foot a:hover { opacity: 1; color: var(--cash-green); }

    @media (max-width: 640px) {
      .bar { padding: 1.25rem; }
      main { padding: 1rem 1rem 2rem; }
      .card { transform: rotate(-2deg); }
      @keyframes cardIn {
        from { opacity: 0; transform: rotate(-2deg) translateY(24px) scale(0.96); }
        to   { opacity: 1; transform: rotate(-2deg) translateY(0) scale(1); }
      }
      @keyframes cardFloat {
        0%, 100% { transform: rotate(-2deg) translateY(0); }
        50%      { transform: rotate(-2deg) translateY(-4px); }
      }
      .pill-phone { font-size: 0.72rem; padding: 0.4rem 0.7rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card { animation: none !important; }
    }
  </style>
</head>
<body>
  <header class="bar">
    <a href="index.html" class="wordmark">cash bff</a>
    <div class="bar__right">
      <span class="pill-phone" id="phone-pill">+1 signed in</span>
      <button type="button" class="signout" id="signout">sign out</button>
    </div>
  </header>

  <main>
    <div class="card-wrap">
      <div class="card" role="img" aria-label="your cash bff card showing your total balance">
        <div class="magstripe" aria-hidden="true"></div>
        <div class="card__body">
          <div class="card__label">balance</div>
          <div class="card__amount loading" id="amount">—</div>
          <div class="card__meta">
            <span class="card__brand">cash bff</span>
            <span class="card__across" id="across"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="page-foot">
    <a href="privacy.html">privacy</a>
    <span>·</span>
    <a href="mailto:hi@cashbff.com">hi@cashbff.com</a>
  </footer>

  <script>
    // ── Config ───────────────────────────────────────
    const API_BASE = 'https://sms-service-sope.onrender.com';
    const TOKEN_KEY = 'cbff_token';

    // ── Phone pill ──────────────────────────────────
    const params = new URLSearchParams(location.search);
    const rawPhone = params.get('phone') || '';
    const digits = rawPhone.replace(/\D/g, '');
    const pill = document.getElementById('phone-pill');
    if (digits.length >= 10) {
      const d = digits.slice(-10);
      pill.textContent = `+1 (${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    }

    // ── Helpers ─────────────────────────────────────
    function formatMoney(n) {
      const rounded = Math.round(n * 100) / 100;
      const dollars = Math.floor(rounded);
      const cents = Math.round((rounded - dollars) * 100);
      return {
        dollars: '$' + dollars.toLocaleString('en-US'),
        cents: '.' + String(cents).padStart(2, '0'),
      };
    }

    // ── Sign out ─────────────────────────────────────
    document.getElementById('signout').addEventListener('click', async () => {
      try {
        const token = sessionStorage.getItem(TOKEN_KEY);
        const headers = {};
        if (token) headers['Authorization'] = `Bearer ${token}`;
        await fetch(`${API_BASE}/api/logout`, {
          method: 'POST',
          headers,
          credentials: 'include',
        });
      } catch (_) { /* we're leaving anyway */ }
      sessionStorage.clear();
      location.href = 'index.html';
    });

    // ── Fetch and render ────────────────────────────
    async function loadHome() {
      const amountEl = document.getElementById('amount');
      const acrossEl = document.getElementById('across');

      const token = sessionStorage.getItem(TOKEN_KEY);
      if (!token) {
        location.href = 'index.html';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/home`, {
          headers: { 'Authorization': `Bearer ${token}` },
          credentials: 'include',
        });

        if (res.status === 401) {
          sessionStorage.clear();
          location.href = 'index.html';
          return;
        }
        if (!res.ok) throw new Error('bad response');

        const data = await res.json();
        const { dollars, cents } = formatMoney(Number(data.total_balance || 0));
        amountEl.classList.remove('loading');
        amountEl.innerHTML =
          dollars +
          '<span class="cents">' + cents + '</span>' +
          '<span class="stop">.</span>';

        const n = Number(data.card_count || 0);
        acrossEl.textContent = n > 0
          ? (n === 1 ? 'across 1 card' : `across ${n} cards`)
          : '';
      } catch (_) {
        amountEl.classList.remove('loading');
        amountEl.classList.add('err');
        amountEl.textContent = 'give us a sec…';
        acrossEl.textContent = '';
      }
    }

    loadHome();
  </script>
</body>
</html>
