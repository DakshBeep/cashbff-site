<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>home · cash bff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    :root {
      --cash-green: #014751;
      --electric-green: #D3FFB4;
      --periwinkle: #C5B6F1;
      --off-black: #1A1717;
      --vanilla: #FCFAF2;
      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── Top bar (shared pattern) ─────────────────── */
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.75rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .wordmark {
      font-family: var(--font-display);
      font-weight: 700; font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
    }
    .bar__right {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      font-size: 0.82rem;
    }
    .pill-phone {
      background: rgba(1,71,81,0.08);
      color: var(--cash-green);
      padding: 0.45rem 0.85rem;
      border-radius: 100px;
      font-weight: 500;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
    }
    .signout {
      opacity: 0.55;
      font-weight: 500;
      transition: opacity 0.15s ease, color 0.15s ease;
    }
    .signout:hover { opacity: 1; color: var(--cash-green); }

    /* ── Hero — the single moment ─────────────────── */
    main {
      max-width: 40rem;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
      text-align: center;
    }

    .label {
      font-size: 0.98rem;
      opacity: 0.55;
      font-weight: 500;
      margin-bottom: 1.25rem;
      letter-spacing: 0.005em;
      animation: fadeUp 0.5s ease-out 0.1s both;
    }

    .amount {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(4.5rem, 14vw, 9rem);
      line-height: 0.92;
      letter-spacing: -0.035em;
      color: var(--cash-green);
      margin: 0 auto;
      min-height: 1em;
      animation: fadeUp 0.7s cubic-bezier(0.34, 1.2, 0.64, 1) 0.2s both;
    }
    .amount.loading { opacity: 0.25; }
    .amount .cents {
      font-size: 0.5em;
      opacity: 0.6;
      letter-spacing: -0.01em;
      font-weight: 500;
    }
    .amount .stop {
      /* The full stop — "that's it, that's the page." */
      color: var(--periwinkle);
      font-size: 0.5em;
      margin-left: 0.02em;
      opacity: 0.9;
    }

    .context {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      opacity: 0.65;
      line-height: 1.6;
      animation: fadeUp 0.5s ease-out 0.45s both;
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
    }
    .context .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--electric-green);
      box-shadow: 0 0 8px rgba(211, 255, 180, 0.5);
      animation: livePulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1;    transform: scale(1);   }
      50%      { opacity: 0.4;  transform: scale(0.8); }
    }
    .context.err {
      color: var(--off-black);
      opacity: 0.55;
      font-style: italic;
    }
    .context.err .live-dot { display: none; }

    /* ── Footer ────────────────────────────────────── */
    .page-foot {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      font-size: 0.72rem;
      opacity: 0.35;
      padding: 2rem 2rem 2.25rem;
    }
    .page-foot a:hover { opacity: 1; color: var(--cash-green); }

    /* ── Animations ───────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .bar { padding: 1.25rem; }
      main { padding: 2.5rem 1.25rem 4rem; }
      .pill-phone { font-size: 0.72rem; padding: 0.4rem 0.7rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .label, .amount, .context, .context .live-dot {
        animation: none !important;
        opacity: 1 !important;
      }
    }
  </style>
</head>
<body>
  <header class="bar">
    <a href="index.html" class="wordmark">cash bff</a>
    <div class="bar__right">
      <span class="pill-phone" id="phone-pill">+1 signed in</span>
      <button type="button" class="signout" id="signout">sign out</button>
    </div>
  </header>

  <main>
    <div class="label" id="label">your cards</div>
    <div class="amount loading" id="amount">$—</div>
    <div class="context" id="context">&nbsp;</div>

    <!-- Quiet placeholder — future modules drop in here one by one. -->
  </main>

  <footer class="page-foot">
    <a href="privacy.html">privacy</a>
    <span>·</span>
    <a href="mailto:hi@cashbff.com">hi@cashbff.com</a>
  </footer>

  <script>
    // ── Config ───────────────────────────────────────
    const API_BASE = 'https://sms-service-sope.onrender.com';
    const TOKEN_KEY = 'cbff_token';
    const NAME_KEY = 'cbff_first_name';

    // ── Phone pill ──────────────────────────────────
    const params = new URLSearchParams(location.search);
    const rawPhone = params.get('phone') || '';
    const digits = rawPhone.replace(/\D/g, '');
    const pill = document.getElementById('phone-pill');
    if (digits.length >= 10) {
      const d = digits.slice(-10);
      pill.textContent = `+1 (${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    }

    // ── Helpers ─────────────────────────────────────
    function formatMoney(n) {
      const rounded = Math.round(n * 100) / 100;
      const dollars = Math.floor(rounded);
      const cents = Math.round((rounded - dollars) * 100);
      const dollarsStr = dollars.toLocaleString('en-US');
      const centsStr = String(cents).padStart(2, '0');
      return { dollars: '$' + dollarsStr, cents: '.' + centsStr };
    }

    function humanAgo(iso) {
      if (!iso) return null;
      const then = new Date(iso).getTime();
      const now = Date.now();
      const diff = Math.max(0, now - then);
      const s = Math.floor(diff / 1000);
      if (s < 60)  return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60)  return m === 1 ? 'a minute ago' : `${m} minutes ago`;
      const h = Math.floor(m / 60);
      if (h < 24)  return h === 1 ? 'an hour ago' : `${h} hours ago`;
      const d = Math.floor(h / 24);
      if (d < 7)   return d === 1 ? 'yesterday' : `${d} days ago`;
      const w = Math.floor(d / 7);
      if (w < 5)   return w === 1 ? 'a week ago' : `${w} weeks ago`;
      const mo = Math.floor(d / 30);
      return mo === 1 ? 'a month ago' : `${mo} months ago`;
    }

    // ── Personalize the label with first name (falls back to "your cards") ──
    const firstName = sessionStorage.getItem(NAME_KEY);
    if (firstName && firstName.trim()) {
      const safe = firstName.replace(/[<>&"]/g, '').toLowerCase();
      document.getElementById('label').textContent = `${safe}'s cards`;
    }

    // ── Sign out ─────────────────────────────────────
    document.getElementById('signout').addEventListener('click', async () => {
      try {
        const token = sessionStorage.getItem(TOKEN_KEY);
        const headers = {};
        if (token) headers['Authorization'] = `Bearer ${token}`;
        await fetch(`${API_BASE}/api/logout`, {
          method: 'POST',
          headers,
          credentials: 'include',
        });
      } catch (_) { /* ignore — we're leaving anyway */ }
      sessionStorage.clear();
      location.href = 'index.html';
    });

    // ── Fetch the home snapshot ─────────────────────
    async function loadHome() {
      const amountEl = document.getElementById('amount');
      const contextEl = document.getElementById('context');

      const token = sessionStorage.getItem(TOKEN_KEY);
      if (!token) {
        // No auth yet — send them through the front door.
        location.href = 'index.html';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/home`, {
          headers: { 'Authorization': `Bearer ${token}` },
          credentials: 'include',
        });

        if (res.status === 401) {
          sessionStorage.clear();
          location.href = 'index.html';
          return;
        }
        if (!res.ok) throw new Error('bad response');

        const data = await res.json();
        const { dollars, cents } = formatMoney(Number(data.total_balance || 0));
        amountEl.classList.remove('loading');
        amountEl.innerHTML =
          dollars +
          '<span class="cents">' + cents + '</span>' +
          '<span class="stop">.</span>';

        // Single line of context — live-dot + when we last synced.
        const when = humanAgo(data.last_updated);
        contextEl.innerHTML =
          '<span class="live-dot" aria-hidden="true"></span>' +
          (when ? `updated ${when}` : 'live');
      } catch (_) {
        amountEl.classList.remove('loading');
        amountEl.textContent = '—';
        contextEl.classList.add('err');
        contextEl.textContent = "couldn't load right now — try again in a sec";
      }
    }

    loadHome();
  </script>
</body>
</html>
