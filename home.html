<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>home · cash bff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    :root {
      --cash-green: #014751;
      --electric-green: #D3FFB4;
      --periwinkle: #C5B6F1;
      --off-black: #1A1717;
      --vanilla: #FCFAF2;
      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── Top bar ───────────────────────────────────── */
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.75rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .wordmark {
      font-family: var(--font-display);
      font-weight: 700; font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
    }
    .bar__right {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      font-size: 0.82rem;
    }
    .pill-phone {
      background: rgba(1,71,81,0.08);
      color: var(--cash-green);
      padding: 0.45rem 0.85rem;
      border-radius: 100px;
      font-weight: 500;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
    }
    .signout {
      opacity: 0.55;
      font-weight: 500;
      transition: opacity 0.15s ease, color 0.15s ease;
    }
    .signout:hover { opacity: 1; color: var(--cash-green); }

    /* ── Main composition ──────────────────────────── */
    main {
      max-width: 42rem;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .greeting {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(2rem, 5.5vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--off-black);
      margin-bottom: 4.5rem;
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s both;
    }

    .eyebrow {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cash-green);
      opacity: 0.85;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s ease-out 0.4s both;
    }

    .win__row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      padding-bottom: 0.4rem;
    }

    .card-label {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--off-black);
      opacity: 0.78;
      flex-shrink: 0;
      animation: fadeUp 0.5s ease-out 0.55s both;
    }
    .card-label.loading { opacity: 0.25; }

    .amount {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2.75rem, 8vw, 4.5rem);
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--cash-green);
      flex-shrink: 0;
      animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) 1.2s both;
    }
    .amount.loading { opacity: 0.18; }
    .amount .cents {
      font-size: 0.45em;
      opacity: 0.6;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-left: 0.04em;
    }

    .horizon-line {
      height: 1px;
      background: var(--cash-green);
      transform: scaleX(0);
      transform-origin: left;
      animation: drawLine 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.7s forwards;
    }
    @keyframes drawLine { to { transform: scaleX(1); } }

    .rest {
      margin-top: 2.25rem;
      display: flex;
      align-items: center;
      gap: 0.75em;
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--off-black);
      opacity: 0;
      animation: fadeUp 0.5s ease-out 2.1s both;
    }
    .rest[hidden] { display: none; }
    .rest__text  { opacity: 0.5; }
    .rest__leader {
      flex: 1;
      border-bottom: 1px dashed currentColor;
      opacity: 0.22;
      align-self: center;
      height: 1px;
      min-width: 1.5rem;
    }
    .rest__amount { opacity: 0.5; }

    .err {
      margin-top: 2rem;
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--off-black);
      opacity: 0.55;
      font-style: italic;
      animation: fadeUp 0.5s ease-out both;
    }

    /* ── Footer ────────────────────────────────────── */
    .page-foot {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      font-size: 0.72rem;
      opacity: 0.35;
      padding: 1.5rem 2rem 2rem;
    }
    .page-foot a:hover { opacity: 1; color: var(--cash-green); }

    /* ── Animations ───────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .bar { padding: 1.25rem; }
      main { padding: 2.5rem 1.25rem 4rem; }
      .greeting { margin-bottom: 3rem; }
      .pill-phone { font-size: 0.72rem; padding: 0.4rem 0.7rem; }
      .win__row { align-items: flex-end; gap: 0.6rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .greeting, .eyebrow, .card-label, .amount, .rest {
        animation: none !important;
        opacity: 1 !important;
      }
      .horizon-line {
        animation: none !important;
        transform: scaleX(1);
      }
    }
  </style>
</head>
<body>
  <header class="bar">
    <a href="index.html" class="wordmark">cash bff</a>
    <div class="bar__right">
      <span class="pill-phone" id="phone-pill">+1 signed in</span>
      <button type="button" class="signout" id="signout">sign out</button>
    </div>
  </header>

  <main>
    <h1 class="greeting">
      hey <span id="name-slot">there</span>,<br>
      today is a soft one.
    </h1>

    <section class="win" id="win">
      <div class="eyebrow">next small win</div>
      <div class="win__row">
        <span class="card-label loading" id="card-label">—</span>
        <span class="amount loading" id="amount">—</span>
      </div>
      <div class="horizon-line" aria-hidden="true"></div>
      <div class="rest" id="rest" hidden>
        <span class="rest__text" id="rest-text"></span>
        <span class="rest__leader" aria-hidden="true"></span>
        <span class="rest__amount" id="rest-amount"></span>
      </div>
      <div class="err" id="err" hidden></div>
    </section>
  </main>

  <footer class="page-foot">
    <a href="privacy.html">privacy</a>
    <span>·</span>
    <a href="mailto:hi@cashbff.com">hi@cashbff.com</a>
  </footer>

  <script>
    // ── Config ───────────────────────────────────────
    const API_BASE = 'https://sms-service-sope.onrender.com';
    const TOKEN_KEY = 'cbff_token';
    const NAME_KEY = 'cbff_first_name';

    // ── Phone pill ──────────────────────────────────
    const params = new URLSearchParams(location.search);
    const rawPhone = params.get('phone') || '';
    const digits = rawPhone.replace(/\D/g, '');
    const pill = document.getElementById('phone-pill');
    if (digits.length >= 10) {
      const d = digits.slice(-10);
      pill.textContent = `+1 (${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    }

    // ── Greeting: pull first name from sessionStorage, fallback "there" ─
    const firstName = (sessionStorage.getItem(NAME_KEY) || '').trim();
    if (firstName) {
      document.getElementById('name-slot').textContent =
        firstName.replace(/[<>&"]/g, '').toLowerCase();
    }

    // ── Helpers ─────────────────────────────────────
    function formatMoney(n) {
      const rounded = Math.round(n * 100) / 100;
      const dollars = Math.floor(rounded);
      const cents = Math.round((rounded - dollars) * 100);
      return {
        dollars: '$' + dollars.toLocaleString('en-US'),
        cents: '.' + String(cents).padStart(2, '0'),
      };
    }

    // Small-number → word for warm phrasing. Digits for bigger counts.
    function countWord(n) {
      const w = ['zero','one','two','three','four','five','six','seven','eight','nine','ten'];
      return n <= 10 ? w[n] : String(n);
    }

    function cleanCardName(raw) {
      // Plaid often returns something like "VentureOne" or "Platinum Secured".
      // Lowercase for brand voice; trim.
      return String(raw || '').toLowerCase().trim();
    }

    // ── Sign out ─────────────────────────────────────
    document.getElementById('signout').addEventListener('click', async () => {
      try {
        const token = sessionStorage.getItem(TOKEN_KEY);
        const headers = {};
        if (token) headers['Authorization'] = `Bearer ${token}`;
        await fetch(`${API_BASE}/api/logout`, { method: 'POST', headers, credentials: 'include' });
      } catch (_) { /* we're leaving anyway */ }
      sessionStorage.clear();
      location.href = 'index.html';
    });

    // ── Fetch + render ──────────────────────────────
    async function loadHome() {
      const amountEl = document.getElementById('amount');
      const cardLabelEl = document.getElementById('card-label');
      const restEl = document.getElementById('rest');
      const restTextEl = document.getElementById('rest-text');
      const restAmountEl = document.getElementById('rest-amount');
      const errEl = document.getElementById('err');

      const token = sessionStorage.getItem(TOKEN_KEY);
      if (!token) { location.href = 'index.html'; return; }

      try {
        const res = await fetch(`${API_BASE}/api/home`, {
          headers: { 'Authorization': `Bearer ${token}` },
          credentials: 'include',
        });
        if (res.status === 401) { sessionStorage.clear(); location.href = 'index.html'; return; }
        if (!res.ok) throw new Error('bad response');

        const data = await res.json();
        const cards = Array.isArray(data.cards) ? data.cards : [];
        const active = cards.filter(c => Number(c.balance) > 0.005);

        if (active.length === 0) {
          amountEl.classList.remove('loading');
          amountEl.style.fontSize = 'clamp(1.25rem, 3vw, 1.75rem)';
          amountEl.style.fontFamily = 'var(--font-body)';
          amountEl.style.fontWeight = '500';
          amountEl.style.fontStyle = 'italic';
          amountEl.textContent = "you're clean.";
          cardLabelEl.classList.remove('loading');
          cardLabelEl.textContent = '';
          return;
        }

        // The smallest active balance = the snowball's first domino.
        active.sort((a, b) => a.balance - b.balance);
        const smallest = active[0];
        const rest = active.slice(1);

        // Featured row
        cardLabelEl.classList.remove('loading');
        const name = cleanCardName(smallest.name);
        const maskBit = smallest.mask ? ` · …${smallest.mask}` : '';
        cardLabelEl.textContent = name + maskBit;

        const { dollars, cents } = formatMoney(Number(smallest.balance));
        amountEl.classList.remove('loading');
        amountEl.innerHTML = dollars + '<span class="cents">' + cents + '</span>';

        // Rest row (only if there's a rest)
        if (rest.length > 0) {
          const sum = rest.reduce((acc, c) => acc + Number(c.balance || 0), 0);
          const restLabel = rest.length === 1
            ? 'one more behind it'
            : `${countWord(rest.length)} more behind it`;
          restTextEl.textContent = restLabel;
          const r = formatMoney(sum);
          restAmountEl.innerHTML = r.dollars + '<span class="cents">' + r.cents + '</span>';
          restEl.hidden = false;
        }
      } catch (_) {
        amountEl.classList.remove('loading');
        amountEl.style.fontSize = 'clamp(1.1rem, 2.5vw, 1.4rem)';
        amountEl.style.fontFamily = 'var(--font-body)';
        amountEl.style.fontWeight = '500';
        amountEl.style.fontStyle = 'italic';
        amountEl.textContent = '';
        cardLabelEl.classList.remove('loading');
        cardLabelEl.textContent = '';
        errEl.hidden = false;
        errEl.textContent = 'give us a sec — trying again in a moment.';
      }
    }

    loadHome();
  </script>
</body>
</html>
