<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- Sentry browser SDK: forwards JS errors + unhandled rejections to our Sentry project. -->
  <script
    src="https://js.sentry-cdn.com/2d45e7a7cdc726451c61d775aa22fbf2.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="/assets/js/sentry-init.js"></script>
  <title>home · cash bff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    :root {
      --cash-green: #014751;
      --electric-green: #D3FFB4;
      --periwinkle: #C5B6F1;
      --off-black: #1A1717;
      --vanilla: #FCFAF2;
      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      min-height: 100dvh;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── Top bar ───────────────────────────────────── */
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem 1.25rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .wordmark {
      font-family: var(--font-display);
      font-weight: 700; font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
    }
    .bar__right {
      display: flex; align-items: center; gap: 1.25rem;
      font-size: 0.82rem;
    }
    .pill-phone {
      background: rgba(1,71,81,0.08);
      color: var(--cash-green);
      padding: 0.45rem 0.85rem;
      border-radius: 100px;
      font-weight: 500;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
    }
    .signout {
      opacity: 0.55;
      font-weight: 500;
      transition: opacity 0.15s ease, color 0.15s ease;
    }
    .signout:hover { opacity: 1; color: var(--cash-green); }

    /* ── Scatter canvas ────────────────────────────── */
    main {
      max-width: 64rem;
      margin: 0 auto;
      padding: 0.5rem 2rem 4rem;
      position: relative;
    }

    .scatter {
      position: relative;
      width: 100%;
      height: 40rem;
      margin-top: 1rem;
    }

    /* ── Seed card ─────────────────────────────────── */
    .seed {
      position: absolute;
      border-radius: 1.1rem;
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: var(--vanilla);
      background: var(--cash-green);
      cursor: pointer;
      border: none;
      font-family: inherit;
      text-align: left;
      overflow: hidden;
      box-shadow: 0 14px 36px -18px rgba(26,23,23,0.35);
      transition: box-shadow 0.3s ease, z-index 0s;
      will-change: transform;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      --rot: 0deg;
      animation: drift var(--drift-dur, 9s) ease-in-out infinite;
      animation-delay: var(--drift-delay, 0s);
    }
    .seed:hover {
      box-shadow: 0 28px 60px -20px rgba(26,23,23,0.45);
      z-index: 10;
    }
    .seed::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 15%, rgba(211,255,180,0.12), transparent 55%);
      pointer-events: none;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) rotate(var(--rot)); }
      25%      { transform: translate(6px, -4px) rotate(calc(var(--rot) + 0.6deg)); }
      50%      { transform: translate(-3px, 5px) rotate(calc(var(--rot) - 0.4deg)); }
      75%      { transform: translate(-5px, -2px) rotate(calc(var(--rot) + 0.3deg)); }
    }

    /* Size tiers — smallest balance = biggest card. */
    .seed.size-huge {
      background: var(--electric-green);
      color: var(--off-black);
    }
    .seed.size-huge .seed__balance { color: var(--cash-green); }
    .seed.size-huge .seed__top,
    .seed.size-huge .seed__bottom { color: var(--off-black); opacity: 0.7; }

    .seed.size-large {
      background: var(--periwinkle);
      color: var(--off-black);
    }
    .seed.size-large .seed__balance { color: var(--cash-green); }
    .seed.size-large .seed__top,
    .seed.size-large .seed__bottom { color: var(--off-black); opacity: 0.7; }

    .seed.size-med   { background: var(--cash-green); }
    .seed.size-small { background: #022d33; }
    .seed.size-tiny  { background: #01272d; opacity: 0.88; }

    .seed__top {
      font-weight: 500; font-size: 0.78rem;
      letter-spacing: 0.02em; opacity: 0.75;
      text-transform: lowercase;
    }
    .seed__balance {
      font-family: var(--font-display);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--electric-green);
    }
    .seed.size-huge  .seed__balance { font-size: 3rem; }
    .seed.size-large .seed__balance { font-size: 2.2rem; }
    .seed.size-med   .seed__balance { font-size: 1.65rem; }
    .seed.size-small .seed__balance { font-size: 1.3rem; }
    .seed.size-tiny  .seed__balance { font-size: 1.05rem; }
    .seed__balance .cents {
      font-size: 0.45em; opacity: 0.65; font-weight: 500;
      margin-left: 0.08em;
    }
    .seed__bottom {
      font-weight: 500; font-size: 0.78rem;
      opacity: 0.75; text-transform: lowercase;
    }

    /* ── States ────────────────────────────────────── */
    .state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.6rem;
      color: var(--off-black);
      opacity: 0.55;
      font-size: 0.92rem;
      text-align: center;
      padding: 2rem;
    }
    .state--err { font-style: italic; }
    .state--loading { font-style: italic; }
    .state a {
      color: var(--cash-green);
      opacity: 0.9;
      border-bottom: 1px solid currentColor;
      padding-bottom: 1px;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 0.7;  }
    }
    .state--loading span { animation: shimmer 1.8s ease-in-out infinite; }

    /* ── Footer ────────────────────────────────────── */
    .page-foot {
      display: flex; justify-content: center; gap: 1.25rem;
      font-size: 0.72rem; opacity: 0.35;
      padding: 1.5rem 2rem 2rem;
    }
    .page-foot a:hover { opacity: 1; color: var(--cash-green); }

    @media (max-width: 720px) {
      .bar { padding: 0.75rem 1.25rem 1rem; }
      main { padding: 0.25rem 1rem 3rem; }
      .scatter { height: 48rem; }
      .pill-phone { font-size: 0.72rem; padding: 0.4rem 0.7rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      .seed { animation: none !important; transform: rotate(var(--rot)); }
      .state--loading span { animation: none; }
    }
  </style>
</head>
<body>
  <header class="bar">
    <a href="index.html" class="wordmark">cash bff</a>
    <div class="bar__right">
      <span class="pill-phone" id="phone-pill">+1 signed in</span>
      <button type="button" class="signout" id="signout">sign out</button>
    </div>
  </header>

  <main>
    <section class="scatter" id="scatter" aria-label="your cards">
      <div class="state state--loading" id="loading"><span>settling in…</span></div>
    </section>
  </main>

  <footer class="page-foot">
    <a href="privacy.html">privacy</a>
    <span>·</span>
    <a href="mailto:hi@cashbff.com">hi@cashbff.com</a>
  </footer>

  <script src="/assets/js/home.js" defer></script>
</body>
</html>
