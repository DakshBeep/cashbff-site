<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>home · cash bff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    :root {
      --cash-green: #014751;
      --electric-green: #D3FFB4;
      --periwinkle: #C5B6F1;
      --off-black: #1A1717;
      --vanilla: #FCFAF2;
      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      min-height: 100dvh;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── Top bar ───────────────────────────────────── */
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.75rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .wordmark {
      font-family: var(--font-display);
      font-weight: 700; font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
    }
    .bar__right {
      display: flex; align-items: center; gap: 1.25rem;
      font-size: 0.82rem;
    }
    .pill-phone {
      background: rgba(1,71,81,0.08);
      color: var(--cash-green);
      padding: 0.45rem 0.85rem;
      border-radius: 100px;
      font-weight: 500;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
    }
    .signout {
      opacity: 0.55;
      font-weight: 500;
      transition: opacity 0.15s ease, color 0.15s ease;
    }
    .signout:hover { opacity: 1; color: var(--cash-green); }

    /* ── Drift composition ─────────────────────────── */
    main {
      max-width: 48rem;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    .drift {
      position: relative;
      width: 100%;
      min-height: 32rem;
    }

    .empty, .err {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.6rem;
      color: var(--off-black);
      opacity: 0.55;
      font-size: 0.92rem;
    }
    .err { font-style: italic; }
    .empty a {
      color: var(--cash-green);
      opacity: 0.9;
      border-bottom: 1px solid currentColor;
      padding-bottom: 1px;
    }

    /* ── Card ──────────────────────────────────────── */
    .card {
      position: absolute;
      width: 10.5rem;
      aspect-ratio: 1.586 / 1;
      border-radius: 1rem;
      background: var(--cash-green);
      color: var(--vanilla);
      padding: 0.95rem 1rem;
      box-shadow: 0 20px 40px -16px rgba(26,23,23,0.25);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      transform-origin: center;
      will-change: transform;
      transition: box-shadow 0.25s ease, z-index 0s;
      opacity: 0;
      animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .card:hover {
      z-index: 50 !important;
      box-shadow: 0 32px 60px -18px rgba(26,23,23,0.38);
    }
    .card.is-tapped { z-index: 60 !important; }

    .card__top {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.68rem;
      letter-spacing: 0.01em;
      opacity: 0.75;
      text-transform: lowercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card__balance {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.35rem;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--electric-green);
    }
    .card__balance .cents {
      font-size: 0.6em; opacity: 0.7; font-weight: 500;
      letter-spacing: -0.01em; margin-left: 0.04em;
    }
    .card__bottom {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.72rem;
      opacity: 0.78;
      text-transform: lowercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Each card gets its own float animation. The inner wrapper floats
       while the outer keeps its rotation so the two transforms don't fight. */
    .card__inner {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: space-between;
    }

    /* Five unique float keyframes — each a slightly different arc so nothing syncs. */
    @keyframes drift1 {
      0%,100% { transform: translate(0,0) rotate(-6deg); }
      50%     { transform: translate(6px,-10px) rotate(-5.2deg); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) rotate(4deg); }
      50%     { transform: translate(-8px,-8px) rotate(4.8deg); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(0,0) rotate(-3deg); }
      50%     { transform: translate(5px,-12px) rotate(-3.6deg); }
    }
    @keyframes drift4 {
      0%,100% { transform: translate(0,0) rotate(7deg); }
      50%     { transform: translate(-6px,-14px) rotate(6.3deg); }
    }
    @keyframes drift5 {
      0%,100% { transform: translate(0,0) rotate(-5deg); }
      50%     { transform: translate(9px,-9px) rotate(-4.2deg); }
    }

    .card[data-slot="0"] {
      top: 8%; left: 10%; z-index: 1;
      animation: fadeIn 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.05s forwards,
                 drift1 7.2s ease-in-out 0.8s infinite;
    }
    .card[data-slot="1"] {
      top: 22%; left: 54%; z-index: 2;
      animation: fadeIn 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.18s forwards,
                 drift2 8.4s ease-in-out 1.4s infinite;
    }
    .card[data-slot="2"] {
      top: 50%; left: 18%; z-index: 3;
      animation: fadeIn 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.31s forwards,
                 drift3 6.1s ease-in-out 0.3s infinite;
    }
    .card[data-slot="3"] {
      top: 38%; left: 68%; z-index: 4;
      animation: fadeIn 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.44s forwards,
                 drift4 9.0s ease-in-out 2.1s infinite;
    }
    .card[data-slot="4"] {
      top: 68%; left: 44%; z-index: 5;
      animation: fadeIn 0.8s cubic-bezier(0.2,0.8,0.2,1) 0.57s forwards,
                 drift5 5.4s ease-in-out 1.0s infinite;
    }

    /* Hover: gently lift out of the float. We pause the drift animation and
       apply a static lifted transform using the slot's base rotation. */
    .card:hover { animation-play-state: running, paused; }
    .card[data-slot="0"]:hover .card__inner { transform: scale(1.04); }
    .card[data-slot="1"]:hover .card__inner { transform: scale(1.04); }
    .card[data-slot="2"]:hover .card__inner { transform: scale(1.04); }
    .card[data-slot="3"]:hover .card__inner { transform: scale(1.04); }
    .card[data-slot="4"]:hover .card__inner { transform: scale(1.04); }
    .card__inner { transition: transform 0.25s cubic-bezier(0.2,0.8,0.2,1); }

    .card.is-tapped .card__inner { transform: scale(1.08); }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Footer ────────────────────────────────────── */
    .page-foot {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      font-size: 0.72rem;
      opacity: 0.35;
      padding: 1.5rem 2rem 2rem;
    }
    .page-foot a:hover { opacity: 1; color: var(--cash-green); }

    /* ── Mobile: vertical floaty stack ─────────────── */
    @media (max-width: 640px) {
      .bar { padding: 1.25rem; }
      main { padding: 1rem 1rem 3rem; }
      .drift { min-height: 42rem; }
      .pill-phone { font-size: 0.72rem; padding: 0.4rem 0.7rem; }
      .card { width: 9.25rem; }

      /* Re-layout into a gentle vertical column with smaller rotations. */
      .card[data-slot="0"] { top: 2%;  left: 10%;  }
      .card[data-slot="1"] { top: 20%; left: 42%; }
      .card[data-slot="2"] { top: 40%; left: 8%;  }
      .card[data-slot="3"] { top: 58%; left: 44%; }
      .card[data-slot="4"] { top: 78%; left: 18%; }

      @keyframes drift1 {
        0%,100% { transform: translate(0,0) rotate(-3deg); }
        50%     { transform: translate(4px,-6px) rotate(-2.4deg); }
      }
      @keyframes drift2 {
        0%,100% { transform: translate(0,0) rotate(2deg); }
        50%     { transform: translate(-4px,-5px) rotate(2.6deg); }
      }
      @keyframes drift3 {
        0%,100% { transform: translate(0,0) rotate(-2deg); }
        50%     { transform: translate(3px,-7px) rotate(-2.4deg); }
      }
      @keyframes drift4 {
        0%,100% { transform: translate(0,0) rotate(3deg); }
        50%     { transform: translate(-3px,-8px) rotate(2.6deg); }
      }
      @keyframes drift5 {
        0%,100% { transform: translate(0,0) rotate(-2.5deg); }
        50%     { transform: translate(5px,-5px) rotate(-2deg); }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card {
        animation: fadeIn 0.4s ease-out both !important;
      }
      .card[data-slot="0"] { transform: rotate(-6deg); }
      .card[data-slot="1"] { transform: rotate(4deg);  }
      .card[data-slot="2"] { transform: rotate(-3deg); }
      .card[data-slot="3"] { transform: rotate(7deg);  }
      .card[data-slot="4"] { transform: rotate(-5deg); }
    }
  </style>
</head>
<body>
  <header class="bar">
    <a href="index.html" class="wordmark">cash bff</a>
    <div class="bar__right">
      <span class="pill-phone" id="phone-pill">+1 signed in</span>
      <button type="button" class="signout" id="signout">sign out</button>
    </div>
  </header>

  <main>
    <section class="drift" id="drift" aria-label="your cards"></section>
  </main>

  <footer class="page-foot">
    <a href="privacy.html">privacy</a>
    <span>·</span>
    <a href="mailto:hi@cashbff.com">hi@cashbff.com</a>
  </footer>

  <script>
    // ── Config ───────────────────────────────────────
    const API_BASE = 'https://api.cashbff.com';
    const NAME_KEY = 'cbff_first_name';
    const MAX_SLOTS = 5;

    // ── Phone pill ──────────────────────────────────
    const params = new URLSearchParams(location.search);
    const rawPhone = params.get('phone') || '';
    const digits = rawPhone.replace(/\D/g, '');
    const pill = document.getElementById('phone-pill');
    if (digits.length >= 10) {
      const d = digits.slice(-10);
      pill.textContent = `+1 (${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    }

    // First name pulled from localStorage for parity with home.html, though
    // Drift doesn't render a greeting — we still read it so other tabs stay warm.
    (localStorage.getItem(NAME_KEY) || '').trim();

    // ── Helpers ─────────────────────────────────────
    function formatMoney(n) {
      const rounded = Math.round(n * 100) / 100;
      const dollars = Math.floor(rounded);
      const cents = Math.round((rounded - dollars) * 100);
      return {
        dollars: '$' + dollars.toLocaleString('en-US'),
        cents: '.' + String(cents).padStart(2, '0'),
      };
    }

    function cleanText(raw) {
      return String(raw || '').toLowerCase().trim().replace(/[<>&"]/g, '');
    }

    // ── Sign out ─────────────────────────────────────
    document.getElementById('signout').addEventListener('click', async () => {
      try {
        await fetch(`${API_BASE}/api/logout`, { method: 'POST', credentials: 'include' });
      } catch (_) { /* leaving anyway */ }
      localStorage.clear();
      location.href = 'index.html';
    });

    // ── Render ──────────────────────────────────────
    function renderCard(card, slot) {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'card';
      el.dataset.slot = String(slot);
      el.setAttribute('aria-label',
        `${cleanText(card.institution)} ${cleanText(card.name)} card`);

      const { dollars, cents } = formatMoney(Number(card.balance) || 0);
      const institution = cleanText(card.institution) || cleanText(card.name) || 'card';
      const nickname = cleanText(card.name) || 'card';
      const maskBit = card.mask ? ` · …${card.mask}` : '';

      el.innerHTML = `
        <span class="card__inner">
          <span class="card__top">${institution}</span>
          <span class="card__balance">${dollars}<span class="cents">${cents}</span></span>
          <span class="card__bottom">${nickname}${maskBit}</span>
        </span>
      `;

      el.addEventListener('click', () => {
        el.classList.add('is-tapped');
        setTimeout(() => el.classList.remove('is-tapped'), 260);
        console.log('card clicked', card.name);
      });

      return el;
    }

    function renderEmpty(container) {
      container.innerHTML = `
        <div class="empty">
          <span>no cards connected yet.</span>
          <a href="connect.html">connect one →</a>
        </div>
      `;
    }

    function renderError(container) {
      container.innerHTML = `
        <div class="err">give us a sec — trying again in a moment.</div>
      `;
    }

    async function loadHome() {
      const container = document.getElementById('drift');
      try {
        const res = await fetch(`${API_BASE}/api/home`, {
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
        });
        if (res.status === 401) { localStorage.clear(); location.href = 'index.html'; return; }
        if (!res.ok) throw new Error('bad response');

        const data = await res.json();
        const cards = Array.isArray(data.cards) ? data.cards : [];

        // Cache first_name if the API offers one.
        if (data.first_name) {
          try { localStorage.setItem(NAME_KEY, String(data.first_name)); } catch (_) {}
        }

        if (cards.length === 0) { renderEmpty(container); return; }

        container.innerHTML = '';
        cards.slice(0, MAX_SLOTS).forEach((c, i) => {
          container.appendChild(renderCard(c, i));
        });
      } catch (_) {
        renderError(container);
      }
    }

    loadHome();
  </script>
</body>
</html>
