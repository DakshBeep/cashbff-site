<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- Sentry browser SDK: forwards JS errors + unhandled rejections to our Sentry project. -->
  <script
    src="https://js.sentry-cdn.com/2d45e7a7cdc726451c61d775aa22fbf2.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="/assets/js/sentry-init.js"></script>

  <title>cashbff — about</title>
  <meta name="description" content="about cashbff.">
  <meta property="og:title" content="cashbff — about">
  <meta property="og:description" content="about cashbff.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cashbff.com/about">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- PostHog product analytics. Hybrid mode: backend tracks business events,
       browser handles autocapture + pageviews. CSP-safe (no eval). -->
  <script src="/assets/js/posthog-init.js" defer></script>

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500;
      font-display: swap;
    }

    :root {
      --vanilla: #FCFAF2;
      --off-black: #1A1717;
      --cash-green: #014751;
      --hairline: rgba(26, 23, 23, 0.12);
      --soft-ink: rgba(26, 23, 23, 0.62);

      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    .stage {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin-bottom: 5rem;
    }
    .wordmark {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
      text-transform: lowercase;
    }
    .nav {
      display: flex;
      gap: 1.4rem;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .nav a {
      opacity: 0.7;
      transition: opacity .15s;
    }
    .nav a:hover { opacity: 1; }

    /* placeholder content area — fill in later. */
    .content {
      flex: 1;
    }

    .footer {
      margin-top: auto;
      padding-top: 2.5rem;
      font-size: 0.85rem;
      opacity: 0.5;
      line-height: 1.7;
      border-top: 1px solid var(--hairline);
      text-align: left;
    }
    .footer a {
      text-decoration: underline;
      text-decoration-color: var(--hairline);
      text-underline-offset: 3px;
      transition: text-decoration-color .15s, opacity .15s;
    }
    .footer a:hover { text-decoration-color: var(--off-black); opacity: 1; }
    .footer .sep { margin: 0 0.5rem; opacity: 0.5; }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="stage">

    <header class="bar">
      <a href="/" class="wordmark">cashbff</a>
      <nav class="nav" aria-label="primary">
        <a href="/">home</a>
        <a href="/pricing">pricing</a>
        <a href="/signup">sign in</a>
      </nav>
    </header>

    <section class="content" aria-label="about">
      <!-- empty for now — content TBD. -->
    </section>

    <footer class="footer">
      <a href="/privacy">privacy</a><span class="sep">·</span><a href="/terms">terms</a><span class="sep">·</span><a href="/pricing">pricing</a>
    </footer>

  </main>

  <script src="/assets/js/auth-banner.js" defer></script>
  <script src="/assets/js/talk.js" defer></script>
</body>
</html>
