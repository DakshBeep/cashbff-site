<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- Sentry browser SDK: forwards JS errors + unhandled rejections to our Sentry project. -->
  <script
    src="https://js.sentry-cdn.com/2d45e7a7cdc726451c61d775aa22fbf2.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="/assets/js/sentry-init.js"></script>

  <title>cashbff — talk to your money, inside claude.</title>
  <meta name="description" content="talk to your money, inside claude.">
  <meta property="og:title" content="cashbff — talk to your money, inside claude.">
  <meta property="og:description" content="talk to your money, inside claude.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cashbff.com">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- PostHog product analytics. Hybrid mode: backend tracks business events,
       browser handles autocapture + pageviews. CSP-safe (no eval). -->
  <script src="/assets/js/posthog-init.js" defer></script>

  <!-- Vercel Analytics + Speed Insights — cookieless edge-collected pageviews + web vitals. -->
  <script src="/assets/js/vercel-analytics-init.js" defer></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script src="/assets/js/vercel-speed-insights-init.js" defer></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

  <style>
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Bold.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'Greed Condensed';
      src: url('fonts/GreedCondensed-Medium.woff2') format('woff2');
      font-weight: 500;
      font-display: swap;
    }

    /* B&W brand. cash-green is used ONLY on .period spans + the wordmark
       + the step numbers. everything else is monochrome. */
    :root {
      --vanilla: #FCFAF2;
      --off-black: #1A1717;
      --cash-green: #014751;
      --hairline: rgba(26, 23, 23, 0.12);
      --soft-ink: rgba(26, 23, 23, 0.62);

      --font-display: 'Greed Condensed', 'Archivo Narrow', 'Arial Narrow', Impact, sans-serif;
      --font-body: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--vanilla);
      color: var(--off-black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      min-height: 100dvh;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    .stage {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── top bar ── */
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin-bottom: 5rem;
    }
    .wordmark {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--cash-green);
      text-transform: lowercase;
    }
    .nav {
      display: flex;
      gap: 1.4rem;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .nav a {
      opacity: 0.7;
      transition: opacity .15s;
    }
    .nav a:hover { opacity: 1; }

    /* ── hero ── */
    .hero {
      text-align: left;
      margin: 0 0 2.25rem;
      opacity: 0;
      animation: fadeIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .headline {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2.8rem, 9vw, 5.25rem);
      line-height: 0.93;
      letter-spacing: -0.02em;
      text-transform: lowercase;
      color: var(--off-black);
      margin-bottom: 1.1rem;
    }
    .headline .period { color: var(--cash-green); }
    .sub {
      font-size: clamp(0.95rem, 1.6vw, 1.05rem);
      max-width: 28rem;
      opacity: 0.65;
      line-height: 1.5;
    }

    /* ── CTA stack ── */
    .cta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.85rem;
      margin: 0 0 5rem;
      opacity: 0;
      animation: fadeIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }
    .btn-primary {
      background: var(--off-black);
      color: var(--vanilla);
      font-weight: 700;
      font-size: 1.1rem;
      padding: 1.05rem 2rem;
      border-radius: 14px;
      text-transform: lowercase;
      letter-spacing: -0.005em;
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      transition: transform .12s ease, opacity .15s;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary .arrow { font-size: 1.15rem; }

    .secondary-link {
      font-size: 0.9rem;
      opacity: 0.55;
      transition: opacity .15s;
    }
    .secondary-link .as-link {
      /* button styled as inline link — same look as <a>, no default nav.
         keeping it as <button> means clicks fire onAddClick (talk.js)
         without an `href="#"` causing a hash-jump to top. */
      display: inline;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: var(--off-black);
      text-decoration: underline;
      text-decoration-color: var(--hairline);
      text-underline-offset: 3px;
      cursor: pointer;
    }
    .secondary-link .as-link:hover { text-decoration-color: var(--off-black); }

    .toast {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: var(--off-black);
      color: var(--vanilla);
      padding: 0.75rem 1.1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      max-width: 22rem;
      z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── how it works — 3 steps ── */
    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin: 0 0 5rem;
    }
    @media (max-width: 640px) {
      .steps { grid-template-columns: 1fr; gap: 1.5rem; }
    }
    .step {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .step__num {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2rem;
      color: var(--cash-green);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .step__title {
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.005em;
    }
    .step__sub {
      font-size: 0.85rem;
      opacity: 0.6;
      line-height: 1.4;
    }

    /* ── footer ── */
    .footer {
      margin-top: auto;
      padding-top: 2.5rem;
      font-size: 0.85rem;
      opacity: 0.5;
      line-height: 1.7;
      border-top: 1px solid var(--hairline);
      text-align: left;
    }
    .footer a {
      text-decoration: underline;
      text-decoration-color: var(--hairline);
      text-underline-offset: 3px;
      transition: text-decoration-color .15s, opacity .15s;
    }
    .footer a:hover { text-decoration-color: var(--off-black); opacity: 1; }
    .footer .sep { margin: 0 0.5rem; opacity: 0.5; }

    /* ── reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="stage">

    <header class="bar">
      <a href="/" class="wordmark">cashbff</a>
      <nav class="nav" aria-label="primary">
        <a href="/about">about</a>
        <a href="/pricing">pricing</a>
        <a href="/signup">sign in</a>
      </nav>
    </header>

    <section class="hero">
      <h1 class="headline">
        talk to your money<span class="period">,</span><br>
        inside claude<span class="period">.</span>
      </h1>
    </section>

    <section class="cta">
      <a class="btn-primary" id="get-started-btn" href="/signup">
        <span>start now</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <p class="secondary-link">already set up? <button class="as-link" id="add-btn" type="button">open in claude →</button></p>

      <div class="toast" id="toast" role="status" aria-live="polite">URL copied. paste it in the claude.ai dialog.</div>
    </section>

    <section class="steps" aria-label="how it works">
      <div class="step">
        <div class="step__num">1</div>
        <div class="step__title">connect your bank.</div>
      </div>
      <div class="step">
        <div class="step__num">2</div>
        <div class="step__title">try it free.</div>
      </div>
      <div class="step">
        <div class="step__num">3</div>
        <div class="step__title">open in claude.</div>
      </div>
    </section>

    <footer class="footer">
      <a href="/privacy">privacy</a><span class="sep">·</span><a href="/terms">terms</a><span class="sep">·</span><a href="/pricing">pricing</a>
    </footer>

  </main>

  <script src="/assets/js/auth-banner.js" defer></script>
  <script src="/assets/js/talk.js" defer></script>
</body>
</html>
